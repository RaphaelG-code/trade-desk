<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trade Desk</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f2f5;color:#1a1d23;font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

.topbar{background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.topbar-row{display:flex;align-items:center;gap:12px;padding:12px 32px;flex-wrap:wrap;}
.brand{font-size:17px;font-weight:900;color:#111827;letter-spacing:-.5px;}
.lot-pill{padding:8px 20px;border-radius:9999px;border:none;background:#2563eb;color:#fff;font-weight:700;font-size:12px;cursor:pointer;box-shadow:0 2px 8px rgba(37,99,235,.35);transition:all .15s;}
.lot-pill:hover{background:#1d4ed8;}
.lot-pill.off{background:#fff;color:#6b7280;border:2px solid #d1d5db;box-shadow:none;}
.lot-pill.off:hover{border-color:#3b82f6;color:#2563eb;}
.new-lot-btn{padding:7px 16px;border-radius:9999px;border:2px dashed #9ca3af;background:transparent;color:#9ca3af;font-weight:600;font-size:12px;cursor:pointer;transition:all .15s;}
.new-lot-btn:hover{border-color:#3b82f6;color:#2563eb;}
.nl-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.nl-in{border:2px solid #d1d5db;border-radius:9999px;padding:7px 16px;font-size:13px;outline:none;font-family:'Inter',sans-serif;}
.nl-in:focus{border-color:#3b82f6;}
.nl-ok{background:#059669;border:none;border-radius:9999px;padding:8px 12px;color:#fff;cursor:pointer;display:flex;align-items:center;}
.nl-x{background:none;border:none;padding:7px;color:#9ca3af;cursor:pointer;display:flex;align-items:center;}
.nl-x:hover{color:#ef4444;}

.tabs-row{display:flex;padding:0 32px;background:#fff;overflow-x:auto;}
.tb{display:flex;align-items:center;gap:7px;padding:13px 20px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;border-bottom:3px solid transparent;background:none;border-top:none;border-left:none;border-right:none;cursor:pointer;transition:all .15s;white-space:nowrap;margin-bottom:-1px;}
.tb:hover{color:#374151;}
.tb.on{color:#2563eb;border-bottom-color:#2563eb;}
.tb svg{width:14px;height:14px;}

.main{max-width:1280px;margin:0 auto;padding:28px 32px;}

/* RATES */
.rates-grid{display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:16px;margin-bottom:26px;}
@media(max-width:800px){.rates-grid{grid-template-columns:1fr;}}
.rcard{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px 22px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.rcard label{display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:10px;}
.rate-in{width:100%;background:#fff7ed;border:1.5px solid #fb923c;border-radius:10px;padding:12px 16px;color:#c2410c;font-size:19px;font-weight:700;font-family:'Inter',monospace;outline:none;}
.rate-in:focus{border-color:#ea580c;}
.lot-info{background:#eff6ff;border:2px dashed #93c5fd;border-radius:14px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.li-label{font-size:11px;color:#6b7280;font-weight:600;margin-bottom:5px;}
.li-name{font-size:14px;font-weight:700;color:#1d4ed8;}
.li-stats{font-size:12px;color:#6b7280;text-align:right;white-space:nowrap;}

/* SECTION HEADER */
.sh{display:flex;align-items:center;gap:9px;margin-bottom:14px;margin-top:6px;}
.sh-bar{width:4px;height:20px;border-radius:2px;flex-shrink:0;}
.sh-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#374151;}

/* GRIDS */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;}
@media(max-width:900px){.g4,.g3{grid-template-columns:1fr 1fr;}}
@media(max-width:500px){.g4,.g3{grid-template-columns:1fr;}}

/* METRIC CARDS */
.mc{background:#fff;border:1.5px solid #e5e7eb;border-radius:14px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.mc.sky{background:#f0f9ff;border-color:#bae6fd;}
.mc.grn{background:#f0fdf4;border-color:#bbf7d0;}
.mc.amb{background:#fffbeb;border-color:#fde68a;}
.mc.red{background:#fef2f2;border-color:#fecaca;}
.mc-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.mc-lbl{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.07em;line-height:1.4;}
.mc-ico{color:#cbd5e1;display:flex;}
.mc-val{font-size:22px;font-weight:700;line-height:1.2;margin-bottom:4px;color:#111827;}
.mc-val.sky{color:#0284c7;} .mc-val.grn{color:#15803d;} .mc-val.amb{color:#b45309;} .mc-val.red{color:#b91c1c;}
.mc-sub{font-size:12px;color:#6b7280;}
.mc-sub.sky{color:#0369a1;} .mc-sub.grn{color:#15803d;}

/* BANNER */
.banner{border-radius:14px;border:1.5px solid;padding:18px 24px;margin-bottom:22px;display:flex;align-items:center;gap:14px;}
.banner.g{background:#f0fdf4;border-color:#86efac;}
.banner.a{background:#fffbeb;border-color:#fde68a;}
.banner.r{background:#fef2f2;border-color:#fca5a5;}
.ban-title{font-size:15px;font-weight:700;margin-bottom:3px;}
.ban-title.g{color:#14532d;} .ban-title.a{color:#78350f;} .ban-title.r{color:#7f1d1d;}
.ban-sub{font-size:13px;line-height:1.5;}
.ban-sub.g{color:#166534;} .ban-sub.a{color:#92400e;} .ban-sub.r{color:#991b1b;}

/* NEGO */
.nego{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:22px 24px;margin-bottom:22px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.nego-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
.nego-iw{flex:1;min-width:180px;}
.nego-lbl{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px;}
.nego-in{width:100%;background:#f9fafb;border:1.5px solid #d1d5db;border-radius:10px;padding:13px 18px;color:#111827;font-size:22px;font-weight:700;font-family:'Inter',monospace;outline:none;transition:all .15s;}
.nego-in:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.nego-eur{font-size:13px;color:#6b7280;font-weight:500;white-space:nowrap;}
.mbadge{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:9999px;font-size:13px;font-weight:700;border:1.5px solid;}
.mbadge.g{background:#dcfce7;color:#15803d;border-color:#86efac;}
.mbadge.a{background:#fef3c7;color:#b45309;border-color:#fde68a;}
.mbadge.r{background:#fee2e2;color:#b91c1c;border-color:#fca5a5;}

.pbar{display:flex;height:14px;border-radius:9999px;overflow:hidden;margin-bottom:8px;}
.pb-g{flex:1;background:#4ade80;} .pb-a{flex:1;background:#fbbf24;} .pb-r{flex:1;background:#f87171;}
.pbar-lbls{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:3px;}
.pg{color:#15803d;} .pa{color:#b45309;text-align:center;} .pr{color:#b91c1c;}
.pbar-desc{display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;}

/* PROFIT */
.pbox{border-radius:14px;border:1.5px solid;padding:22px 26px;margin-bottom:22px;}
.pbox.g{background:#f0fdf4;border-color:#86efac;}
.pbox.a{background:#fffbeb;border-color:#fde68a;}
.pbox.r{background:#fef2f2;border-color:#fca5a5;}
.prow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(0,0,0,.07);}
.prow:last-child{border-bottom:none;padding-top:18px;border-top:2px solid rgba(0,0,0,.1);margin-top:4px;}
.prow-l{font-size:14px;color:#374151;font-weight:500;}
.prow-v{font-weight:700;font-family:'Inter',monospace;font-size:14px;}
.prow-v.neg{color:#dc2626;} .prow-v.neu{color:#111827;}
.pnet-l{font-size:15px;font-weight:800;color:#111827;}
.pnet-v{font-size:34px;font-weight:900;font-family:'Inter',monospace;line-height:1;}
.pnet-v.g{color:#15803d;} .pnet-v.a{color:#b45309;} .pnet-v.r{color:#b91c1c;}
.pnet-sub{font-size:13px;color:#6b7280;font-weight:600;text-align:right;margin-top:6px;}

/* LOT */
.lot-hdr{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:14px;padding:18px 24px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.lh-id{font-size:11px;color:#6b7280;font-weight:600;margin-bottom:4px;}
.lh-name{font-size:17px;font-weight:700;color:#111827;}
.lh-stats{display:flex;gap:20px;flex-wrap:wrap;}
.lh-stat{font-size:13px;color:#374151;font-weight:500;}
.lh-stat b{color:#1d4ed8;margin-left:4px;}

/* TABLE */
.twrap{background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:auto;margin-bottom:16px;}
.dt{width:100%;border-collapse:collapse;}
.dt th{text-align:left;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;padding:13px 20px;border-bottom:1.5px solid #e5e7eb;background:#f9fafb;white-space:nowrap;}
.dt td{padding:12px 20px;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
.dt tr:last-child td{border-bottom:none;}
.dt tr:hover td{background:#fafafa;}
.td-m{color:#111827;font-weight:500;}
.td-vmr{color:#6b7280;font-family:'Inter',monospace;font-size:13px;}
.td-tot{color:#1d4ed8;font-weight:700;font-family:'Inter',monospace;}
.tin{background:#fff;border:1.5px solid #d1d5db;border-radius:8px;padding:7px 11px;font-size:13px;font-weight:700;font-family:'Inter',monospace;color:#111827;outline:none;transition:all .15s;}
.tin:focus{border-color:#3b82f6;}
.tin::placeholder{color:#9ca3af;font-weight:400;}
.tdel{background:none;border:none;color:#d1d5db;cursor:pointer;padding:4px;transition:color .15s;display:flex;align-items:center;}
.tdel:hover{color:#ef4444;}

/* ADD FORM */
.aform{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px 22px;}
.arow{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;}
.afield{display:flex;flex-direction:column;gap:6px;}
.afield label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;}
.asel,.ain{background:#fff;border:1.5px solid #d1d5db;border-radius:10px;padding:11px 14px;font-size:13px;color:#111827;outline:none;font-family:'Inter',sans-serif;transition:all .15s;}
.asel:focus,.ain:focus{border-color:#3b82f6;}
.af-grow{flex:1;min-width:280px;}
.af-sm{width:120px;}

/* BUTTONS */
.btn-blue{background:#2563eb;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:13px;padding:12px 20px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .15s;font-family:'Inter',sans-serif;}
.btn-blue:hover{background:#1d4ed8;}
.btn-sec{background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;color:#374151;font-weight:600;font-size:12px;padding:9px 16px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.btn-sec:hover{border-color:#3b82f6;color:#2563eb;}

/* PARAMS */
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
@media(max-width:900px){.pgrid{grid-template-columns:1fr 1fr;}}
.pcard{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px 20px;}
.pcard label{display:block;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.pin{width:100%;background:#f0f9ff;border:2px solid #7dd3fc;border-radius:10px;padding:12px 14px;color:#0369a1;font-size:19px;font-weight:700;font-family:'Inter',monospace;outline:none;}
.pin:focus{border-color:#38bdf8;}

.ref-note{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:10px;padding:12px 18px;margin-bottom:16px;font-size:13px;color:#1e40af;line-height:1.6;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#059669;color:#fff;font-weight:700;font-size:13px;padding:12px 22px;border-radius:10px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}

.empty{text-align:center;padding:44px;color:#9ca3af;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <span class="brand">TRADE DESK</span>
    <div id="pills"></div>
    <div id="nlz"></div>
  </div>
  <div class="tabs-row">
    <button class="tb on" id="tb-dashboard" onclick="setTab('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Dashboard
    </button>
    <button class="tb" id="tb-lot" onclick="setTab('lot')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      Détail du lot
    </button>
    <button class="tb" id="tb-params" onclick="setTab('params')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Paramètres
    </button>
  </div>
</div>

<div class="main" id="main"></div>
<div class="toast" id="toast">✓ Sauvegardé</div>

<script>
const DREF=[
  {m:"iPhone 16 Pro Max 512GB",fr:1380,dxb:1320},{m:"iPhone 16 Pro Max 256GB",fr:1250,dxb:1200},
  {m:"iPhone 16 Pro 512GB",fr:1120,dxb:1100},{m:"iPhone 16 Pro 256GB",fr:1050,dxb:1020},
  {m:"iPhone 16 256GB",fr:880,dxb:850},{m:"iPhone 16 128GB",fr:790,dxb:750},
  {m:"iPhone 15 256GB",fr:650,dxb:630},{m:"iPhone 15 128GB",fr:580,dxb:560},
  {m:"iPhone 14 128GB",fr:440,dxb:420},{m:"iPad Pro 11 4th Gen WIFI 128GB",fr:550,dxb:530},
  {m:"Samsung Galaxy S25 Ultra 256GB",fr:1250,dxb:1200},{m:"Samsung Galaxy S25 256GB",fr:950,dxb:920},
  {m:"Samsung Galaxy S24 Plus 256GB",fr:680,dxb:650},{m:"Samsung Galaxy S24 256GB",fr:590,dxb:570},
  {m:"Samsung Galaxy S24 128GB",fr:540,dxb:520},{m:"Samsung Galaxy A06 64GB",fr:110,dxb:105},
  {m:"Samsung Galaxy A05 64GB",fr:95,dxb:90},{m:"AirTag - 4 Pack",fr:85,dxb:80},
  {m:"Samsung SmartTag2 - 4 Pack",fr:70,dxb:65}
];

function load(){try{const s=localStorage.getItem('td_v3');if(s)return JSON.parse(s);}catch(e){}return null;}
function persist(){try{localStorage.setItem('td_v3',JSON.stringify(S));}catch(e){}}
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
function save(){persist();showToast();}

const saved=load();
let S=saved||{
  rEur:3.68154,rUsd:3.12132,exitC:.8,idealC:.6,ship:4000,tMarg:.15,
  al:0,tab:'dashboard',adding:false,neg:[79807],
  ref:DREF.map(r=>({...r})),
  lots:[{id:"LOT-2026-001",name:"Partner Israel — Mix Apple/Samsung",items:[
    {m:"AirTag - 4 Pack",qty:15,off:""},{m:"Samsung Galaxy A06 64GB",qty:13,off:""},
    {m:"iPhone 14 128GB",qty:12,off:""},{m:"iPhone 15 128GB",qty:10,off:""},
    {m:"Samsung SmartTag2 - 4 Pack",qty:10,off:""},{m:"Samsung Galaxy S24 Plus 256GB",qty:10,off:""},
    {m:"Samsung Galaxy S24 128GB",qty:5,off:""},{m:"Samsung Galaxy S24 256GB",qty:3,off:""},
    {m:"Samsung Galaxy S25 256GB",qty:3,off:""},{m:"iPhone 16 128GB",qty:7,off:""},
    {m:"iPhone 16 256GB",qty:2,off:""},{m:"iPhone 16 Pro 256GB",qty:4,off:""},
    {m:"iPhone 16 Pro 512GB",qty:2,off:""},{m:"iPhone 16 Pro Max 256GB",qty:4,off:""},
    {m:"Samsung Galaxy S25 Ultra 256GB",qty:2,off:""},{m:"Samsung Galaxy A05 64GB",qty:2,off:""},
    {m:"iPhone 15 256GB",qty:2,off:""},{m:"iPad Pro 11 4th Gen WIFI 128GB",qty:2,off:""}
  ]}]
};
if(!S.ref)S.ref=DREF.map(r=>({...r}));
if(!S.neg)S.neg=[];
while(S.neg.length<S.lots.length)S.neg.push(0);

const N=(n,d=0)=>isNaN(n)||n==null?'—':new Intl.NumberFormat('fr-FR',{maximumFractionDigits:d}).format(n);
const P=(n)=>isNaN(n)||n==null?'—':(n*100).toFixed(1)+'%';
const R=m=>S.ref.find(r=>r.m===m)||{fr:0,dxb:0};

function calc(){
  const lot=S.lots[S.al],neg=S.neg[S.al]||0;
  const items=lot.items.map(i=>{const r=R(i.m),mp=parseFloat(i.off)||0;return{...i,ref:r,tFr:i.qty*(mp>0?mp:r.fr),tDxb:i.qty*(mp>0?mp:r.dxb)};});
  const tFr=items.reduce((s,i)=>s+i.tFr,0),tDxb=items.reduce((s,i)=>s+i.tDxb,0);
  const vFr=tFr*S.rEur,vDxb=tDxb*S.rUsd,best=Math.max(vFr,vDxb);
  const er=best*S.exitC,tp=er*S.tMarg,maxB=er-S.ship-tp,idealB=best*S.idealC-S.ship-tp;
  const cp=er-S.ship-neg,cm=er>0?cp/er:0;
  const totalQty=lot.items.reduce((s,i)=>s+(parseInt(i.qty)||0),0);
  return{items,tFr,tDxb,vFr,vDxb,best,bestExit:vFr>=vDxb?'🇫🇷 France / Europe':'🇦🇪 Dubaï',er,tp,maxB,idealB,cp,cm,neg,totalQty,lot};
}

// SVGs
const IC={
  check:`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
  warn:`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  x:`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
  trend:`<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
  dollar:`<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>`,
  target:`<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
  trash:`<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`,
  plus:`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  check28:`<svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
  warn28:`<svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  x28:`<svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`
};

function renderTop(){
  document.getElementById('pills').innerHTML=S.lots.map((l,i)=>
    `<button class="lot-pill${i===S.al?'':' off'}" onclick="switchLot(${i})">${l.id}</button>`
  ).join('');
  const z=document.getElementById('nlz');
  if(S.adding){
    z.innerHTML=`<div class="nl-wrap">
      <input class="nl-in" id="nid" placeholder="LOT-2026-002" style="width:138px" onkeydown="if(event.key==='Enter')confirmLot()">
      <input class="nl-in" id="nnm" placeholder="Nom du lot" style="width:178px" onkeydown="if(event.key==='Enter')confirmLot()">
      <button class="nl-ok" onclick="confirmLot()">${IC.check}</button>
      <button class="nl-x" onclick="S.adding=false;renderTop()">${IC.x}</button>
    </div>`;
    setTimeout(()=>document.getElementById('nid')?.focus(),30);
  } else {
    z.innerHTML=`<button class="new-lot-btn" onclick="S.adding=true;renderTop()">+ Nouveau lot</button>`;
  }
}
function switchLot(i){S.al=i;S.tab='dashboard';activateTab('dashboard');persist();renderTop();render();}
function confirmLot(){
  const id=document.getElementById('nid')?.value?.trim(),name=document.getElementById('nnm')?.value?.trim();
  if(!id)return;
  S.lots.push({id,name:name||id,items:[]});S.neg.push(0);
  S.al=S.lots.length-1;S.adding=false;S.tab='lot';
  save();renderTop();activateTab('lot');render();
}

function activateTab(t){['dashboard','lot','params'].forEach(x=>document.getElementById('tb-'+x)?.classList.toggle('on',x===t));}
function setTab(t){S.tab=t;activateTab(t);render();}

function ratesHtml(){
  const c=calc();
  return`<div class="rates-grid">
    <div class="rcard"><label>EUR / ILS</label><input class="rate-in" type="number" step="0.0001" value="${S.rEur}" oninput="S.rEur=parseFloat(this.value)||0;save();render()"></div>
    <div class="rcard"><label>USD / ILS</label><input class="rate-in" type="number" step="0.0001" value="${S.rUsd}" oninput="S.rUsd=parseFloat(this.value)||0;save();render()"></div>
    <div class="lot-info"><div><div class="li-label">Lot actif</div><div class="li-name">${c.lot.name}</div></div><div class="li-stats">${c.totalQty} unités · ${c.lot.items.length} réf.</div></div>
  </div>`;
}

function render(){
  activateTab(S.tab);
  const el=document.getElementById('main'),c=calc();

  if(S.tab==='dashboard'){
    const ms=c.cm>=S.tMarg?'g':c.cm>=0?'a':'r';
    const isGood=c.neg>0&&c.neg<=c.idealB,isOk=c.neg>c.idealB&&c.neg<=c.maxB,isBad=c.neg>c.maxB&&c.neg>0;
    const bs=isGood?'g':isOk?'a':'r';
    const bannerHtml=c.neg>0?`<div class="banner ${bs}">
      <div style="flex-shrink:0;color:${isGood?'#16a34a':isOk?'#d97706':'#dc2626'}">${isGood?IC.check28:isOk?IC.warn28:IC.x28}</div>
      <div>
        <div class="ban-title ${bs}">${isGood?'✓ EXCELLENT DEAL — BUY NOW':isOk?'⚠ ACCEPTABLE — NEGOTIATE LOWER':'✗ PRICE TOO HIGH — DO NOT BUY'}</div>
        <div class="ban-sub ${bs}">${isGood?"Le prix négocié est en dessous du prix idéal. Excellente marge.":isOk?"Le prix est acceptable mais essayez de négocier plus bas.":"Le prix dépasse le plafond maximum. Vous perdrez de l'argent."}</div>
      </div>
    </div>`:'';

    el.innerHTML=ratesHtml()+bannerHtml+`
    <div class="sh"><div class="sh-bar" style="background:#3b82f6"></div><span class="sh-title">Valeur de Marché</span></div>
    <div class="g4">
      <div class="mc ${c.vFr>=c.vDxb?'sky':''}">
        <div class="mc-hd"><span class="mc-lbl">VMR France (EUR)</span><span class="mc-ico">${IC.trend}</span></div>
        <div class="mc-val ${c.vFr>=c.vDxb?'sky':''}">${N(c.tFr)} €</div>
        <div class="mc-sub">${N(c.vFr)} ILS</div>
      </div>
      <div class="mc ${c.vDxb>c.vFr?'sky':''}">
        <div class="mc-hd"><span class="mc-lbl">VMR Dubaï (USD)</span><span class="mc-ico">${IC.dollar}</span></div>
        <div class="mc-val ${c.vDxb>c.vFr?'sky':''}">${N(c.tDxb)} $</div>
        <div class="mc-sub">${N(c.vDxb)} ILS</div>
      </div>
      <div class="mc sky">
        <div class="mc-hd"><span class="mc-lbl">Meilleur Exit</span><span class="mc-ico">${IC.target}</span></div>
        <div class="mc-val sky" style="font-size:14px;line-height:1.4">${c.bestExit}</div>
        <div class="mc-sub sky">${N(c.best)} ILS</div>
      </div>
      <div class="mc">
        <div class="mc-hd"><span class="mc-lbl">Estimated Resale ×${S.exitC}</span></div>
        <div class="mc-val">${N(c.er)} ILS</div>
        <div class="mc-sub">≈ ${N(c.er/S.rEur)} €</div>
      </div>
    </div>

    <div class="sh"><div class="sh-bar" style="background:#7c3aed"></div><span class="sh-title">Seuils d'Achat (Price Ranges)</span></div>
    <div class="g3">
      <div class="mc grn">
        <div class="mc-hd"><span class="mc-lbl">🟢 Ideal Buy — Target Price</span><span class="mc-ico" style="color:#16a34a">${IC.check}</span></div>
        <div class="mc-val grn">${N(c.idealB)} ILS</div>
        <div class="mc-sub grn">≈ ${N(c.idealB/S.rEur)} € · BUY at this price!</div>
      </div>
      <div class="mc amb">
        <div class="mc-hd"><span class="mc-lbl">🟡 Max Buy — Ceiling Price</span><span class="mc-ico" style="color:#d97706">${IC.warn}</span></div>
        <div class="mc-val amb">${N(c.maxB)} ILS</div>
        <div class="mc-sub">≈ ${N(c.maxB/S.rEur)} € · Acceptable if needed</div>
      </div>
      <div class="mc red">
        <div class="mc-hd"><span class="mc-lbl">🔴 Above Max — Do Not Buy</span><span class="mc-ico" style="color:#dc2626">${IC.x}</span></div>
        <div class="mc-val red">&gt; ${N(c.maxB)} ILS</div>
        <div class="mc-sub">Any price above this = LOSS</div>
      </div>
    </div>

    <div class="sh"><div class="sh-bar" style="background:#f97316"></div><span class="sh-title">Négociation en Cours</span></div>
    <div class="nego">
      <div class="nego-top">
        <div class="nego-iw">
          <div class="nego-lbl">Prix négocié (ILS)</div>
          <input class="nego-in" type="number" value="${c.neg}" oninput="S.neg[S.al]=parseFloat(this.value)||0;save();render()">
        </div>
        <div class="nego-eur">≈ ${N(c.neg/S.rEur)} €</div>
        <div style="margin-left:auto">
          <span class="mbadge ${ms}" style="color:${ms==='g'?'#15803d':ms==='a'?'#b45309':'#b91c1c'}">
            ${ms==='g'?IC.check:ms==='a'?IC.warn:IC.x}
            Marge ${P(c.cm)}
          </span>
        </div>
      </div>
      <div class="pbar"><div class="pb-g"></div><div class="pb-a"></div><div class="pb-r"></div></div>
      <div class="pbar-lbls"><span class="pg">0 — ${N(c.idealB)}</span><span class="pa">${N(c.idealB)} — ${N(c.maxB)}</span><span class="pr">&gt; ${N(c.maxB)}</span></div>
      <div class="pbar-desc"><span>✓ EXCELLENT</span><span>⚠ OK</span><span>✗ TOO HIGH</span></div>
    </div>

    <div class="sh"><div class="sh-bar" style="background:#22c55e"></div><span class="sh-title">Calcul du Profit</span></div>
    <div class="pbox ${ms}">
      <div class="prow"><span class="prow-l">Estimated Resale</span><span class="prow-v neu">${N(c.er)} ILS</span></div>
      <div class="prow"><span class="prow-l">− Shipping &amp; Insurance</span><span class="prow-v neg">-${N(S.ship)} ILS</span></div>
      <div class="prow"><span class="prow-l">− Prix d'achat négocié</span><span class="prow-v neg">-${N(c.neg)} ILS</span></div>
      <div class="prow"><span class="pnet-l">= PROFIT NET</span>
        <div style="text-align:right"><div class="pnet-v ${ms}">${N(c.cp)} ILS</div><div class="pnet-sub">≈ ${N(c.cp/S.rEur)} €</div></div>
      </div>
    </div>`;
  }

  else if(S.tab==='lot'){
    const rows=c.items.length?c.items.map((it,i)=>`
      <tr>
        <td class="td-m">${it.m}</td>
        <td><input class="tin" type="number" value="${it.qty}" style="width:70px" oninput="S.lots[S.al].items[${i}].qty=parseInt(this.value)||0;save();render()"></td>
        <td class="td-vmr">${it.ref.fr} €</td>
        <td class="td-vmr">${it.ref.dxb} $</td>
        <td><input class="tin" type="number" placeholder="offre reç" value="${it.off}" style="width:118px" oninput="S.lots[S.al].items[${i}].off=this.value;save();render()"></td>
        <td class="td-tot">${N(it.tFr)} €</td>
        <td><button class="tdel" onclick="S.lots[S.al].items.splice(${i},1);save();render()">${IC.trash}</button></td>
      </tr>`).join(''):`<tr><td colspan="7"><div class="empty"><p>Aucun produit — ajoutez-en ci-dessous</p></div></td></tr>`;
    const opts=S.ref.map(r=>`<option value="${r.m}">${r.m} (${r.fr}€ / ${r.dxb}$)</option>`).join('');
    el.innerHTML=ratesHtml()+`
    <div class="lot-hdr">
      <div><div class="lh-id">${c.lot.id}</div><div class="lh-name">${c.lot.name}</div></div>
      <div class="lh-stats">
        <div class="lh-stat">Total unités<b>${c.totalQty}</b></div>
        <div class="lh-stat">VMR FR<b>${N(c.tFr)} €</b></div>
        <div class="lh-stat">VMR DXB<b>${N(c.tDxb)} $</b></div>
      </div>
    </div>
    <div class="twrap"><table class="dt">
      <thead><tr><th>Modèle</th><th>Qté</th><th>VMR FR (€/u)</th><th>VMR DXB ($/u)</th><th>Offre reçue (€)</th><th>Total FR (€)</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="aform"><div class="arow">
      <div class="afield af-grow"><label>Sélectionner un modèle</label><select class="asel" id="am"><option value="">— Sélectionner un modèle —</option>${opts}</select></div>
      <div class="afield af-sm"><label>Quantité</label><input class="ain" id="aq" type="number" placeholder="Qté" style="width:100%"></div>
      <button class="btn-blue" onclick="addItem()" style="align-self:flex-end">${IC.plus} Ajouter</button>
    </div></div>`;
  }

  else if(S.tab==='params'){
    const refRows=S.ref.map((r,i)=>`
      <tr>
        <td><input class="tin" value="${r.m}" style="width:260px;font-weight:500;font-family:Inter,sans-serif" onchange="S.ref[${i}].m=this.value;save()"></td>
        <td><input class="tin" type="number" value="${r.fr}" style="width:100px" oninput="S.ref[${i}].fr=parseFloat(this.value)||0;save()"></td>
        <td><input class="tin" type="number" value="${r.dxb}" style="width:100px" oninput="S.ref[${i}].dxb=parseFloat(this.value)||0;save()"></td>
        <td><button class="tdel" onclick="S.ref.splice(${i},1);save();render()">${IC.trash}</button></td>
      </tr>`).join('');
    el.innerHTML=ratesHtml()+`
    <div class="sh">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span class="sh-title">Stratégie &amp; Coûts</span>
    </div>
    <div class="pgrid">
      <div class="pcard"><label>Exit Coeff (décote grossiste)</label><input class="pin" type="number" step="0.05" value="${S.exitC}" oninput="S.exitC=parseFloat(this.value)||0;save();render()"></div>
      <div class="pcard"><label>Ideal Buy Coeff (ancre)</label><input class="pin" type="number" step="0.05" value="${S.idealC}" oninput="S.idealC=parseFloat(this.value)||0;save();render()"></div>
      <div class="pcard"><label>Shipping &amp; Insurance (ILS)</label><input class="pin" type="number" step="100" value="${S.ship}" oninput="S.ship=parseFloat(this.value)||0;save();render()"></div>
      <div class="pcard"><label>Target Net Profit (%)</label><input class="pin" type="number" step="0.01" value="${S.tMarg}" oninput="S.tMarg=parseFloat(this.value)||0;save();render()"></div>
    </div>
    <div class="sh"><div class="sh-bar" style="background:#3b82f6"></div><span class="sh-title">Référentiel de Prix</span>
      <span style="flex:1"></span>
      <button class="btn-sec" onclick="if(confirm('Réinitialiser aux valeurs par défaut ?')){S.ref=DREF.map(r=>({...r}));save();render()}">↺ Réinitialiser</button>
    </div>
    <div class="ref-note">💡 Modifie les prix directement — sauvegarde automatique, applicable immédiatement à tous les lots.</div>
    <div class="twrap"><table class="dt">
      <thead><tr><th>Modèle</th><th>VMR France (€)</th><th>VMR Dubaï ($)</th><th></th></tr></thead>
      <tbody>${refRows}</tbody>
    </table></div>
    <div class="aform" style="margin-top:14px"><div class="arow">
      <div class="afield" style="flex:2;min-width:240px"><label>Nom du modèle</label><input class="ain" id="rn" placeholder="Ex: iPhone 17 128GB" style="width:100%"></div>
      <div class="afield" style="width:130px"><label>VMR France (€)</label><input class="ain" id="rf" type="number" placeholder="0" style="width:100%"></div>
      <div class="afield" style="width:130px"><label>VMR Dubaï ($)</label><input class="ain" id="rd" type="number" placeholder="0" style="width:100%"></div>
      <button class="btn-blue" onclick="addRef()" style="align-self:flex-end">${IC.plus} Ajouter</button>
    </div></div>`;
  }
}

function addItem(){
  const m=document.getElementById('am')?.value,q=parseInt(document.getElementById('aq')?.value)||0;
  if(!m||!q)return;S.lots[S.al].items.push({m,qty:q,off:''});save();render();
}
function addRef(){
  const m=document.getElementById('rn')?.value?.trim();
  const fr=parseFloat(document.getElementById('rf')?.value)||0;
  const dxb=parseFloat(document.getElementById('rd')?.value)||0;
  if(!m)return;S.ref.push({m,fr,dxb});save();render();
}

renderTop();render();
</script>
</body>
</html>
