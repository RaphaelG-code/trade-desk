<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trade Desk</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f2f5;color:#1a1d23;font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

/* TOPBAR — logo + tabs only */
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.topbar-row{display:flex;align-items:center;gap:0;padding:0 28px;}
.brand{font-size:17px;font-weight:900;color:#111827;letter-spacing:-.5px;padding:14px 20px 14px 0;margin-right:4px;border-right:1px solid #f3f4f6;}
.tabs-row{display:flex;overflow-x:auto;flex:1;}
.tb{display:flex;align-items:center;gap:6px;padding:14px 18px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;border-bottom:3px solid transparent;background:none;border-top:none;border-left:none;border-right:none;cursor:pointer;transition:all .15s;white-space:nowrap;margin-bottom:-1px;}
.tb:hover{color:#374151;}
.tb.on{color:#2563eb;border-bottom-color:#2563eb;}
.tb svg{width:13px;height:13px;}

/* MAIN */
.main{max-width:1320px;margin:0 auto;padding:24px 28px;}

/* DASHBOARD TOPBAR SECTION */
.dash-header{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px 22px;margin-bottom:22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.rate-mini{display:flex;flex-direction:column;gap:3px;background:#fff7ed;border:1.5px solid #fed7aa;border-radius:10px;padding:10px 14px;}
.rate-mini label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;}
.rate-mini input{width:110px;border:none;color:#c2410c;font-size:16px;font-weight:700;font-family:'Inter',monospace;outline:none;background:transparent;}
.dh-sep{width:1px;height:40px;background:#e5e7eb;flex-shrink:0;}
.lot-selector-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1;}
.lot-selector-label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
.lot-pill{padding:8px 18px;border-radius:9999px;border:none;background:#2563eb;color:#fff;font-weight:700;font-size:12px;cursor:pointer;box-shadow:0 2px 6px rgba(37,99,235,.3);transition:all .15s;}
.lot-pill:hover{background:#1d4ed8;}
.lot-pill.off{background:#fff;color:#6b7280;border:2px solid #d1d5db;box-shadow:none;}
.lot-pill.off:hover{border-color:#3b82f6;color:#2563eb;}
.new-lot-btn{padding:7px 14px;border-radius:9999px;border:2px dashed #9ca3af;background:transparent;color:#9ca3af;font-weight:600;font-size:12px;cursor:pointer;transition:all .15s;}
.new-lot-btn:hover{border-color:#3b82f6;color:#2563eb;}
.nl-wrap{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.nl-in{border:2px solid #d1d5db;border-radius:9999px;padding:7px 14px;font-size:12px;outline:none;font-family:'Inter',sans-serif;}
.nl-in:focus{border-color:#3b82f6;}
.nl-ok{background:#059669;border:none;border-radius:9999px;padding:7px 11px;color:#fff;cursor:pointer;display:flex;align-items:center;}
.nl-x{background:none;border:none;padding:6px;color:#9ca3af;cursor:pointer;display:flex;align-items:center;}
.nl-x:hover{color:#ef4444;}

/* SECTION HEADER */
.sh{display:flex;align-items:center;gap:8px;margin-bottom:14px;margin-top:8px;}
.sh-bar{width:4px;height:18px;border-radius:2px;flex-shrink:0;}
.sh-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#374151;}
.sh-spacer{flex:1;}

/* LOT ACTIVE CARD */
.lot-active-card{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:14px;padding:16px 22px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.lac-left{display:flex;flex-direction:column;gap:3px;}
.lac-id{font-size:10px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.08em;}
.lac-name{font-size:16px;font-weight:700;color:#111827;}
.lac-status select{font-size:12px;color:#2563eb;font-weight:600;border:none;background:transparent;cursor:pointer;outline:none;font-family:'Inter',sans-serif;margin-top:4px;}
.lac-stats{display:flex;gap:16px;flex-wrap:wrap;}
.lac-stat{font-size:12px;color:#374151;font-weight:500;}
.lac-stat b{color:#1d4ed8;margin-left:3px;}

/* GRIDS */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.g-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:12px;}
@media(max-width:1000px){.g5{grid-template-columns:1fr 1fr 1fr;}.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.g5,.g4,.g3,.g2{grid-template-columns:1fr;}}

/* METRIC CARDS */
.mc{background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;padding:16px 18px;}
.mc.sky{background:#f0f9ff;border-color:#bae6fd;}
.mc.grn{background:#f0fdf4;border-color:#bbf7d0;}
.mc.amb{background:#fffbeb;border-color:#fde68a;}
.mc.red{background:#fef2f2;border-color:#fecaca;}
.mc.org{background:#fff7ed;border-color:#fed7aa;}
.mc.pur{background:#faf5ff;border-color:#d8b4fe;}
.mc-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.mc-lbl{font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.07em;line-height:1.4;}
.mc-reco{font-size:10px;color:#6b7280;font-style:italic;margin-top:4px;line-height:1.4;}
.mc-ico{color:#cbd5e1;display:flex;flex-shrink:0;}
.mc-val{font-size:20px;font-weight:700;line-height:1.2;margin-bottom:3px;color:#111827;}
.mc-val.sky{color:#0284c7;}.mc-val.grn{color:#15803d;}.mc-val.amb{color:#b45309;}.mc-val.red{color:#b91c1c;}.mc-val.org{color:#c2410c;}.mc-val.pur{color:#7c3aed;}
.mc-sub{font-size:11px;color:#6b7280;}
.mc-sub.grn{color:#15803d;}.mc-sub.sky{color:#0369a1;}
.mc-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:9999px;margin-bottom:6px;}
.mc-tag.grn{background:#dcfce7;color:#15803d;}
.mc-tag.sky{background:#e0f2fe;color:#0369a1;}
.mc-tag.amb{background:#fef3c7;color:#b45309;}
.mc-tag.org{background:#ffedd5;color:#9a3412;}

/* VMR ROWS */
.vmr-section{background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;margin-bottom:20px;}
.vmr-row{display:flex;border-bottom:1px solid #f3f4f6;flex-wrap:wrap;}
.vmr-row:last-child{border-bottom:none;}
.vmr-row-label{width:180px;padding:14px 18px;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;background:#f9fafb;border-right:1px solid #f3f4f6;display:flex;align-items:center;flex-shrink:0;}
.vmr-cells{display:flex;flex:1;flex-wrap:wrap;}
.vmr-cell{flex:1;min-width:140px;padding:14px 18px;border-right:1px solid #f3f4f6;}
.vmr-cell:last-child{border-right:none;}
.vmr-cell.best{background:#f0f9ff;}
.vmr-cell-lbl{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.vmr-cell-val{font-size:18px;font-weight:700;color:#111827;}
.vmr-cell-val.sky{color:#0284c7;}
.vmr-cell-sub{font-size:11px;color:#9ca3af;margin-top:2px;}
.vmr-best-badge{font-size:9px;font-weight:700;background:#0284c7;color:#fff;padding:2px 6px;border-radius:9999px;margin-left:6px;vertical-align:middle;}

/* SEUILS — 3 cards */
.thresh-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;}
@media(max-width:900px){.thresh-grid{grid-template-columns:1fr;}}
.tc{border-radius:14px;border:2px solid;padding:18px 20px;}
.tc.g{background:#f0fdf4;border-color:#86efac;}
.tc.a{background:#fffbeb;border-color:#fde68a;}
.tc.o{background:#fff7ed;border-color:#fed7aa;}
.tc-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;padding:3px 10px;border-radius:9999px;display:inline-block;margin-bottom:10px;}
.tc-tag.g{background:#dcfce7;color:#15803d;}
.tc-tag.a{background:#fef3c7;color:#b45309;}
.tc-tag.o{background:#ffedd5;color:#9a3412;}
.tc-name{font-size:13px;font-weight:700;margin-bottom:6px;}
.tc-name.g{color:#14532d;}.tc-name.a{color:#78350f;}.tc-name.o{color:#9a3412;}
.tc-val{font-size:28px;font-weight:900;font-family:'Inter',monospace;margin-bottom:3px;}
.tc-val.g{color:#15803d;}.tc-val.a{color:#b45309;}.tc-val.o{color:#c2410c;}
.tc-eur{font-size:12px;font-weight:600;margin-bottom:8px;}
.tc-eur.g{color:#16a34a;}.tc-eur.a{color:#ca8a04;}.tc-eur.o{color:#ea580c;}
.tc-reco{font-size:11px;line-height:1.5;padding-top:8px;border-top:1px solid;}
.tc-reco.g{color:#166534;border-color:#bbf7d0;}.tc-reco.a{color:#92400e;border-color:#fde68a;}.tc-reco.o{color:#c2410c;border-color:#fed7aa;}

/* NEGO */
.nego-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px 22px;margin-bottom:20px;}
.nego-subtitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:8px;}

/* SELL PROPOSALS — no bar */
.proposals-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.proposal-row{background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.p-buyer-sel{background:#fff;border:1.5px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;color:#111827;outline:none;cursor:pointer;font-family:'Inter',sans-serif;}
.p-in{background:#fff;border:1.5px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:16px;font-weight:700;font-family:'Inter',monospace;color:#111827;outline:none;width:150px;}
.p-in:focus{border-color:#3b82f6;}
.p-currency{background:#fff;border:1.5px solid #d1d5db;border-radius:8px;padding:8px 10px;font-size:13px;font-weight:600;color:#374151;outline:none;cursor:pointer;font-family:'Inter',sans-serif;}
.p-terr{font-size:11px;color:#6b7280;background:#f3f4f6;padding:4px 10px;border-radius:6px;white-space:nowrap;}
.p-ils{font-size:12px;color:#374151;font-weight:600;font-family:monospace;white-space:nowrap;}
.p-del{background:none;border:none;color:#d1d5db;cursor:pointer;padding:4px;transition:color .15s;display:flex;margin-left:auto;}
.p-del:hover{color:#ef4444;}
.add-proposal-btn{display:flex;align-items:center;gap:6px;background:none;border:2px dashed #d1d5db;border-radius:9px;color:#6b7280;font-weight:600;font-size:12px;padding:9px 16px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;width:100%;justify-content:center;}
.add-proposal-btn:hover{border-color:#3b82f6;color:#2563eb;background:#eff6ff;}

/* BUY PRICE */
.buy-section{margin-top:18px;padding-top:18px;border-top:1px solid #f3f4f6;}
.buy-row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
.buy-label{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.buy-in{background:#f9fafb;border:2px solid #d1d5db;border-radius:10px;padding:12px 16px;font-size:22px;font-weight:700;font-family:'Inter',monospace;color:#111827;outline:none;width:220px;transition:all .15s;}
.buy-in:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.buy-meta{display:flex;flex-direction:column;gap:6px;}
.buy-eur{font-size:13px;color:#6b7280;font-weight:500;}
.mbadge{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9999px;font-size:12px;font-weight:700;border:1.5px solid;}
.mbadge.g{background:#dcfce7;color:#15803d;border-color:#86efac;}
.mbadge.a{background:#fef3c7;color:#b45309;border-color:#fde68a;}
.mbadge.o{background:#ffedd5;color:#9a3412;border-color:#fed7aa;}
.mbadge.r{background:#fee2e2;color:#b91c1c;border-color:#fca5a5;}
.mbadge.n{background:#f3f4f6;color:#6b7280;border-color:#e5e7eb;}

/* BUY PRICE BAR — starts at idealB, ends at zero-margin */
.bpbar-wrap{margin-top:4px;}
.bpbar-track{height:12px;border-radius:9999px;position:relative;overflow:visible;display:flex;margin-bottom:6px;}
.bpbar-seg{height:100%;border-radius:0;}
.bpbar-seg:first-child{border-radius:9999px 0 0 9999px;}
.bpbar-seg:last-child{border-radius:0 9999px 9999px 0;}
.bpbar-marker{position:absolute;top:-4px;width:20px;height:20px;border-radius:50%;background:#1d4ed8;border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.25);transform:translateX(-50%);transition:left .2s;z-index:2;}
.bpbar-ticks{display:flex;justify-content:space-between;position:relative;}
.bpbar-tick{display:flex;flex-direction:column;align-items:center;gap:3px;}
.bpbar-tick-line{width:1.5px;height:8px;background:#d1d5db;}
.bpbar-tick-lbl{font-size:10px;font-weight:700;white-space:nowrap;}
.bpbar-tick-val{font-size:10px;color:#6b7280;white-space:nowrap;}

/* PROFIT TABLE */
.profit-section{margin-bottom:20px;}
.profit-table{background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;}
.profit-table-head{display:grid;grid-template-columns:1.4fr repeat(var(--cols),1fr);background:#f9fafb;border-bottom:1.5px solid #e5e7eb;padding:10px 18px;gap:8px;}
.profit-table-head span{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.07em;}
.profit-table-row{display:grid;grid-template-columns:1.4fr repeat(var(--cols),1fr);padding:11px 18px;gap:8px;border-bottom:1px solid #f3f4f6;align-items:center;}
.profit-table-row.total-row{background:#f9fafb;border-bottom:none;}
.ptr-label{font-size:13px;color:#374151;font-weight:500;}
.ptr-label.bold{font-weight:700;color:#111827;}
.ptr-val{font-size:13px;font-family:'Inter',monospace;font-weight:600;color:#111827;}
.ptr-val.neg{color:#dc2626;}
.ptr-net{font-size:22px;font-weight:900;}
.ptr-net.g{color:#15803d;}.ptr-net.a{color:#b45309;}.ptr-net.o{color:#c2410c;}.ptr-net.r{color:#b91c1c;}
.ptr-sub{font-size:11px;color:#6b7280;font-weight:400;}

/* BANNER */
.banner{border-radius:14px;border:2px solid;padding:18px 22px;margin-bottom:0;display:flex;align-items:center;gap:14px;}
.banner.g{background:#f0fdf4;border-color:#86efac;}
.banner.a{background:#fffbeb;border-color:#fde68a;}
.banner.o{background:#fff7ed;border-color:#fed7aa;}
.banner.r{background:#fef2f2;border-color:#fca5a5;}
.banner.n{background:#f9fafb;border-color:#e5e7eb;}
.ban-title{font-size:15px;font-weight:700;margin-bottom:3px;}
.ban-title.g{color:#14532d;}.ban-title.a{color:#78350f;}.ban-title.o{color:#9a3412;}.ban-title.r{color:#7f1d1d;}.ban-title.n{color:#374151;}
.ban-sub{font-size:12px;line-height:1.5;}
.ban-sub.g{color:#166534;}.ban-sub.a{color:#92400e;}.ban-sub.o{color:#9a3412;}.ban-sub.r{color:#991b1b;}.ban-sub.n{color:#6b7280;}

/* TABLE */
.twrap{background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:auto;margin-bottom:14px;}
.dt{width:100%;border-collapse:collapse;}
.dt th{text-align:left;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.07em;padding:12px 16px;border-bottom:1.5px solid #e5e7eb;background:#f9fafb;white-space:nowrap;}
.dt td{padding:11px 16px;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
.dt tr:last-child td{border-bottom:none;}
.dt tr:hover td{background:#fafafa;}
.tin{background:#fff;border:1.5px solid #d1d5db;border-radius:7px;padding:6px 10px;font-size:12px;font-weight:700;font-family:'Inter',monospace;color:#111827;outline:none;transition:all .15s;}
.tin:focus{border-color:#3b82f6;}
.tdel{background:none;border:none;color:#d1d5db;cursor:pointer;padding:3px;transition:color .15s;display:flex;}
.tdel:hover{color:#ef4444;}

/* ADD FORM */
.aform{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px 20px;margin-bottom:14px;}
.arow{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
.afield{display:flex;flex-direction:column;gap:5px;}
.afield label{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;}
.asel,.ain{background:#fff;border:1.5px solid #d1d5db;border-radius:9px;padding:10px 12px;font-size:13px;color:#111827;outline:none;font-family:'Inter',sans-serif;transition:all .15s;}
.asel:focus,.ain:focus{border-color:#3b82f6;}
.af-grow{flex:1;min-width:240px;}
.af-sm{width:110px;}

/* BUTTONS */
.btn-blue{background:#2563eb;border:none;border-radius:9px;color:#fff;font-weight:700;font-size:12px;padding:10px 18px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;font-family:'Inter',sans-serif;}
.btn-blue:hover{background:#1d4ed8;}
.btn-sec{background:#fff;border:1.5px solid #e5e7eb;border-radius:9px;color:#374151;font-weight:600;font-size:12px;padding:9px 14px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.btn-sec:hover{border-color:#3b82f6;color:#2563eb;}

/* PARAMS */
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:900px){.pgrid{grid-template-columns:1fr 1fr;}}
.pcard{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 18px;}
.pcard label{display:block;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.pin{width:100%;background:#f0f9ff;border:2px solid #7dd3fc;border-radius:9px;padding:10px 12px;color:#0369a1;font-size:18px;font-weight:700;font-family:'Inter',monospace;outline:none;}
.pin:focus{border-color:#38bdf8;}

/* TERRITORY CARDS */
.terr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:900px){.terr-grid{grid-template-columns:1fr 1fr;}}
.terr-card{background:#fff;border:1.5px solid #93c5fd;background:#f0f9ff;border-radius:12px;padding:16px 18px;position:relative;}
.terr-fields{display:flex;flex-direction:column;gap:8px;}
.terr-field{display:flex;flex-direction:column;gap:4px;}
.terr-field label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em;}
.terr-input{background:#fff;border:1.5px solid #e5e7eb;border-radius:7px;padding:7px 10px;font-size:13px;font-weight:600;font-family:'Inter',monospace;color:#111827;outline:none;width:100%;}
.terr-input:focus{border-color:#3b82f6;}
.terr-del{position:absolute;top:12px;right:12px;background:none;border:none;color:#d1d5db;cursor:pointer;padding:3px;display:flex;}
.terr-del:hover{color:#ef4444;}
.add-terr-card{background:#f9fafb;border:2px dashed #d1d5db;border-radius:12px;padding:16px 18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;min-height:140px;}
.add-terr-card:hover{border-color:#3b82f6;background:#eff6ff;color:#2563eb;}

/* BUYERS */
.buyers-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:700px){.buyers-grid{grid-template-columns:1fr 1fr;}}
.buyer-card{background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.buyer-name{font-size:13px;font-weight:600;color:#111827;}

/* REF CATEGORIES */
.cat-section{margin-bottom:20px;}

<div class="main" id="main"></div>

<script>
// ── DEFAULT DATA ──────────────────────────────────────────────────────────────
const DEFAULT_TERRITORIES=[
  {id:'fr',name:'France',flag:'🇫🇷',currency:'EUR',shipping:4000,taxes:20,importDuty:0},
  {id:'dxb',name:'Dubaï',flag:'🇦🇪',currency:'USD',shipping:5000,taxes:0,importDuty:0}
];
const DEFAULT_BUYERS=[
  {id:'easycash',name:'EasyCash',territory:'fr'},
  {id:'recommerce',name:'Recommerce Group',territory:'fr'},
  {id:'mistral',name:'Mistral Phone',territory:'fr'},
  {id:'dinamobile',name:'Dinamobile',territory:'fr'},
  {id:'telephonecash',name:'TelephoneCash',territory:'fr'}
];
const DEFAULT_REF=[
  {cat:'Smartphones',m:'iPhone 16 Pro Max 512GB',prices:{fr:1380,dxb:1320}},
  {cat:'Smartphones',m:'iPhone 16 Pro Max 256GB',prices:{fr:1250,dxb:1200}},
  {cat:'Smartphones',m:'iPhone 16 Pro 512GB',prices:{fr:1120,dxb:1100}},
  {cat:'Smartphones',m:'iPhone 16 Pro 256GB',prices:{fr:1050,dxb:1020}},
  {cat:'Smartphones',m:'iPhone 16 256GB',prices:{fr:880,dxb:850}},
  {cat:'Smartphones',m:'iPhone 16 128GB',prices:{fr:790,dxb:750}},
  {cat:'Smartphones',m:'iPhone 15 256GB',prices:{fr:650,dxb:630}},
  {cat:'Smartphones',m:'iPhone 15 128GB',prices:{fr:580,dxb:560}},
  {cat:'Smartphones',m:'iPhone 14 128GB',prices:{fr:440,dxb:420}},
  {cat:'Smartphones',m:'Samsung Galaxy S25 Ultra 256GB',prices:{fr:1250,dxb:1200}},
  {cat:'Smartphones',m:'Samsung Galaxy S25 256GB',prices:{fr:950,dxb:920}},
  {cat:'Smartphones',m:'Samsung Galaxy S24 Plus 256GB',prices:{fr:680,dxb:650}},
  {cat:'Smartphones',m:'Samsung Galaxy S24 256GB',prices:{fr:590,dxb:570}},
  {cat:'Smartphones',m:'Samsung Galaxy S24 128GB',prices:{fr:540,dxb:520}},
  {cat:'Smartphones',m:'Samsung Galaxy A06 64GB',prices:{fr:110,dxb:105}},
  {cat:'Smartphones',m:'Samsung Galaxy A05 64GB',prices:{fr:95,dxb:90}},
  {cat:'Tablettes',m:'iPad Pro 11 4th Gen WIFI 128GB',prices:{fr:550,dxb:530}},
  {cat:'Accessoires',m:'AirTag - 4 Pack',prices:{fr:85,dxb:80}},
  {cat:'Accessoires',m:'Samsung SmartTag2 - 4 Pack',prices:{fr:70,dxb:65}}
];
const LOT_STATUSES=['','🔍 Prospection','💬 Pricing acheteurs','⚔️ Enchère','✅ Acheté','🚢 En transit','💰 Revendu'];

// ── PERSIST ──────────────────────────────────────────────────────────────────
function load(){try{const s=localStorage.getItem('td_v4');if(s)return JSON.parse(s);}catch(e){}return null;}
function persist(){try{localStorage.setItem('td_v4',JSON.stringify(S));}catch(e){}}
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
function save(){persist();showToast();}

// ── STATE ─────────────────────────────────────────────────────────────────────
const saved=load();
let S=saved||{
  rEur:3.68154,rUsd:3.12132,
  exitC:.8,idealC:.6,tMarg:.15,
  tab:'dashboard',adding:false,al:0,lotCatFilter:'',
  territories:JSON.parse(JSON.stringify(DEFAULT_TERRITORIES)),
  buyers:JSON.parse(JSON.stringify(DEFAULT_BUYERS)),
  ref:DEFAULT_REF.map(r=>({...r,prices:{...r.prices}})),
  lots:[{
    id:'LOT-2026-001',name:'Partner Israel — Mix Apple/Samsung',status:'💬 Pricing acheteurs',
    items:[
      {m:'AirTag - 4 Pack',qty:15},{m:'Samsung Galaxy A06 64GB',qty:13},
      {m:'iPhone 14 128GB',qty:12},{m:'iPhone 15 128GB',qty:10},
      {m:'Samsung SmartTag2 - 4 Pack',qty:10},{m:'Samsung Galaxy S24 Plus 256GB',qty:10},
      {m:'Samsung Galaxy S24 128GB',qty:5},{m:'Samsung Galaxy S24 256GB',qty:3},
      {m:'Samsung Galaxy S25 256GB',qty:3},{m:'iPhone 16 128GB',qty:7},
      {m:'iPhone 16 256GB',qty:2},{m:'iPhone 16 Pro 256GB',qty:4},
      {m:'iPhone 16 Pro 512GB',qty:2},{m:'iPhone 16 Pro Max 256GB',qty:4},
      {m:'Samsung Galaxy S25 Ultra 256GB',qty:2},{m:'Samsung Galaxy A05 64GB',qty:2},
      {m:'iPhone 15 256GB',qty:2},{m:'iPad Pro 11 4th Gen WIFI 128GB',qty:2}
    ],
    buyPrice:79807,
    proposals:[
      {id:'p1',buyerId:'easycash',amount:47000,currency:'EUR'},
      {id:'p2',buyerId:'recommerce',amount:46500,currency:'EUR'}
    ]
  }]
};
// migrations
if(!S.territories)S.territories=JSON.parse(JSON.stringify(DEFAULT_TERRITORIES));
if(!S.buyers)S.buyers=JSON.parse(JSON.stringify(DEFAULT_BUYERS));
if(!S.ref[0]||!S.ref[0].cat)S.ref=DEFAULT_REF.map(r=>({...r,prices:{...r.prices}}));
S.lots.forEach(l=>{if(!l.proposals)l.proposals=[];if(!l.buyPrice)l.buyPrice=0;if(l.status===undefined)l.status='';});

// ── HELPERS ───────────────────────────────────────────────────────────────────
const N=(n,d=0)=>isNaN(n)||n==null?'—':new Intl.NumberFormat('fr-FR',{maximumFractionDigits:d}).format(n);
const P=(n,d=1)=>isNaN(n)||n==null?'—':(n*100).toFixed(d)+'%';
const uid=()=>Math.random().toString(36).slice(2,9);
function terrRate(t){if(!t)return 1;if(t.currency==='EUR')return S.rEur;if(t.currency==='USD')return S.rUsd;return t.customRate||S.rEur;}
function getRef(m){return S.ref.find(r=>r.m===m)||{prices:{}};}
function getRefPrice(m,tid){return getRef(m).prices[tid]||0;}

// ── CALC ──────────────────────────────────────────────────────────────────────
function calc(){
  const lot=S.lots[S.al];
  const bp=lot.buyPrice||0;
  // VMR per territory (in local currency and ILS)
  const terrVmrs={};
  S.territories.forEach(t=>{
    const totalLocal=lot.items.reduce((s,i)=>s+i.qty*(getRefPrice(i.m,t.id)||0),0);
    terrVmrs[t.id]={totalLocal,totalIls:totalLocal*terrRate(t)};
  });
  // Batch total VMR: per item take best territory
  const batchVmr=lot.items.reduce((s,i)=>{
    const best=Math.max(0,...S.territories.map(t=>(getRefPrice(i.m,t.id)||0)*terrRate(t)));
    return s+i.qty*best;
  },0);
  // Best exit territory
  let bestTerrId=S.territories[0]?.id,bestIls=0;
  S.territories.forEach(t=>{if(terrVmrs[t.id].totalIls>bestIls){bestIls=terrVmrs[t.id].totalIls;bestTerrId=t.id;}});
  const bestTerr=S.territories.find(t=>t.id===bestTerrId)||S.territories[0];

  const er=bestIls*S.exitC;
  const maxB=er-bestTerr.shipping-(er*S.tMarg);
  const idealB=bestIls*S.idealC-bestTerr.shipping-(er*S.tMarg);
  const extremeB=er-bestTerr.shipping-(er*0.10); // 10% margin threshold
  const zeroMarginB=er-bestTerr.shipping; // 0% margin = break even

  // Buy price margin (gross, vs estimated resale)
  const buyMarginGross=er>0?(er-bp)/er:0;
  const buyStatus=bp>0&&bp<=idealB?'g':bp>0&&bp<=maxB?'a':bp>0&&bp<=extremeB?'o':bp>0?'r':'n';

  // Proposals
  const proposals=lot.proposals.map(p=>{
    const buyer=S.buyers.find(b=>b.id===p.buyerId);
    const terr=S.territories.find(t=>t.id===(buyer?.territory||'fr'))||S.territories[0];
    const amtIls=p.currency==='EUR'?p.amount*S.rEur:p.currency==='USD'?p.amount*S.rUsd:p.amount||0;
    const profit=amtIls-bp-(terr.shipping||0)-(amtIls*(terr.taxes||0)/100)-(amtIls*(terr.importDuty||0)/100);
    const margin=amtIls>0?profit/amtIls:0;
    const status=margin>=S.tMarg?'g':margin>=0.10?'a':margin>=0?'o':'r';
    return{...p,buyer,terr,amtIls,profit,margin,status};
  });

  const totalQty=lot.items.reduce((s,i)=>s+(parseInt(i.qty)||0),0);
  return{lot,terrVmrs,batchVmr,bestIls,bestTerr,er,maxB,idealB,extremeB,zeroMarginB,buyMarginGross,buyStatus,bp,proposals,totalQty};
}

// ── SVG ICONS ─────────────────────────────────────────────────────────────────
const IC={
  check16:`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
  warn16:`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  x16:`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
  check28:`<svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
  warn28:`<svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  fire28:`<svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 3z"/></svg>`,
  x28:`<svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
  plus:`<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  trash:`<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`,
  box:`<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>`
};

// ── BUY PRICE BAR — based on GROSS MARGIN %, not price ───────────────────────
// Range: from idealB margin (leftmost) down to 0% (rightmost)
// Zones: green = idealMargin→maxMargin | orange = maxMargin→extremeMargin | red = extremeMargin→0%
function buyPriceBarHtml(bp,er,idealB,maxB,extremeB){
  if(!er||er<=0)return'';
  const idealM=er>0?(er-idealB)/er:0;      // ~margin at ideal price (gross, no shipping)
  const maxM=er>0?(er-maxB)/er:0;
  const extremeM=er>0?(er-extremeB)/er:0;
  const currentM=bp>0&&er>0?(er-bp)/er:null;

  // Bar spans from idealM (left=0%) down to 0% (right=100%)
  // Width proportions: green = idealM→maxM, orange = maxM→extremeM, red = extremeM→0
  const range=idealM||1;
  const gW=((idealM-maxM)/range*100).toFixed(1);
  const aW=((maxM-extremeM)/range*100).toFixed(1);
  const rW=((extremeM)/range*100).toFixed(1);

  // Marker: currentM relative to range (0% at left = idealM, 100% at right = 0%)
  const markerPct=currentM!=null?Math.min(Math.max((idealM-currentM)/range*100,0),98):null;

  return`<div class="bpbar-wrap">
    <div class="bpbar-track">
      <div class="bpbar-seg" style="width:${gW}%;background:#4ade80;border-radius:9999px 0 0 9999px"></div>
      <div class="bpbar-seg" style="width:${aW}%;background:#fb923c"></div>
      <div class="bpbar-seg" style="width:${rW}%;background:#f87171;border-radius:0 9999px 9999px 0"></div>
      ${markerPct!=null?`<div class="bpbar-marker" style="left:${markerPct}%"></div>`:''}
    </div>
    <div class="bpbar-ticks">
      <div class="bpbar-tick">
        <div class="bpbar-tick-line"></div>
        <div class="bpbar-tick-lbl" style="color:#15803d">Ideal Buy</div>
        <div class="bpbar-tick-val" style="color:#15803d">${P(idealM)} marge</div>
      </div>
      <div class="bpbar-tick">
        <div class="bpbar-tick-line"></div>
        <div class="bpbar-tick-lbl" style="color:#b45309">Max Buy</div>
        <div class="bpbar-tick-val" style="color:#b45309">${P(maxM)} marge</div>
      </div>
      <div class="bpbar-tick">
        <div class="bpbar-tick-line"></div>
        <div class="bpbar-tick-lbl" style="color:#c2410c">Extreme Risk</div>
        <div class="bpbar-tick-val" style="color:#c2410c">${P(extremeM)} marge</div>
      </div>
      <div class="bpbar-tick">
        <div class="bpbar-tick-line"></div>
        <div class="bpbar-tick-lbl" style="color:#b91c1c">Break Even</div>
        <div class="bpbar-tick-val" style="color:#b91c1c">0% marge</div>
      </div>
    </div>
  </div>`;
}

// ── TAB SYSTEM ────────────────────────────────────────────────────────────────
function renderTop(){
  const c=document.getElementById('tb-lot-container');
  if(c)c.innerHTML='';
  // Inject "Nouveau lot" button next to Paramètres
  const nlc=document.getElementById('tb-newlot-container');
  if(nlc){
    if(S.adding){
      nlc.innerHTML=`<div class="nl-wrap">
        <input class="nl-in" id="nid" placeholder="LOT-2026-002" style="width:120px" onkeydown="if(event.key==='Enter')confirmLot()">
        <input class="nl-in" id="nnm" placeholder="Nom du lot" style="width:150px" onkeydown="if(event.key==='Enter')confirmLot()">
        <button class="nl-ok" onclick="confirmLot()">${IC.check16}</button>
        <button class="nl-x" onclick="S.adding=false;renderTop()">${IC.x16}</button>
      </div>`;
      setTimeout(()=>document.getElementById('nid')?.focus(),30);
    } else {
      nlc.innerHTML=`<button onclick="S.adding=true;renderTop()" style="display:flex;align-items:center;gap:6px;background:#2563eb;border:none;border-radius:8px;color:#fff;font-weight:700;font-size:11px;padding:7px 13px;cursor:pointer;font-family:Inter,sans-serif;">
        ${IC.plus} Nouveau lot
      </button>`;
    }
  }
}
function filterLots(q){
  const list=document.getElementById('lot-dropdown-list');
  if(!list)return;
  const lower=q.toLowerCase();
  list.style.display='block';
  list.innerHTML=S.lots.map((l,i)=>{
    if(lower&&!l.id.toLowerCase().includes(lower)&&!(l.name||'').toLowerCase().includes(lower))return'';
    return`<div onclick="switchLot(${i})" style="padding:10px 16px;cursor:pointer;font-size:13px;font-weight:${i===S.al?'700':'500'};color:${i===S.al?'#1d4ed8':'#374151'};background:${i===S.al?'#eff6ff':'#fff'};border-bottom:1px solid #f3f4f6;" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='${i===S.al?'#eff6ff':'#fff'}'" >
      <div>${l.id}</div>
      <div style="font-size:11px;color:#9ca3af;font-weight:400;margin-top:2px">${l.name||''}</div>
    </div>`;
  }).join('');
}
function activateTab(t){
  ['dashboard','params'].forEach(x=>document.getElementById('tb-'+x)?.classList.toggle('on',x===t));
  document.querySelectorAll('.tb-lot-dyn').forEach(el=>el.classList.toggle('on',t==='lot'));
}
function setTab(t){S.tab=t;activateTab(t);renderTop();render();}
function switchLot(i){S.al=i;S.lotCatFilter='';persist();renderTop();render();}
function confirmLot(){
  const id=document.getElementById('nid')?.value?.trim(),name=document.getElementById('nnm')?.value?.trim();
  if(!id)return;
  S.lots.push({id,name:name||id,status:'',items:[],buyPrice:0,proposals:[]});
  S.al=S.lots.length-1;S.adding=false;S.tab='lot';
  save();renderTop();render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  activateTab(S.tab);
  const el=document.getElementById('main');
  const c=calc();

  // ═══════════════════════════════════════════════════════════════════════════
  // DASHBOARD
  // ═══════════════════════════════════════════════════════════════════════════
  if(S.tab==='dashboard'){

    // ── Dashboard header: taux + sélecteur lot (dropdown avec recherche) ───────
    const nlZone=S.adding
      ?`<div class="nl-wrap">
          <input class="nl-in" id="nid" placeholder="LOT-2026-002" style="width:130px" onkeydown="if(event.key==='Enter')confirmLot()">
          <input class="nl-in" id="nnm" placeholder="Nom du lot" style="width:200px" onkeydown="if(event.key==='Enter')confirmLot()">
          <button class="nl-ok" onclick="confirmLot()">${IC.check16}</button>
          <button class="nl-x" onclick="S.adding=false;render()">${IC.x16}</button>
        </div>`
      :`<button class="new-lot-btn" onclick="S.adding=true;render()">+ Nouveau lot</button>`;

    // Searchable lot selector
    const lotDropdown=`<div style="position:relative;display:inline-block;">
      <div style="display:flex;align-items:center;gap:0;background:#fff;border:2px solid #2563eb;border-radius:10px;overflow:hidden;box-shadow:0 2px 6px rgba(37,99,235,.15);">
        <span style="padding:8px 10px 8px 14px;font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;border-right:1px solid #e5e7eb;">Lot</span>
        <input id="lot-search" type="text" placeholder="Rechercher un lot…"
          value="${S.lots[S.al]?.id||''}"
          style="border:none;outline:none;padding:8px 10px;font-size:13px;font-weight:700;color:#1d4ed8;font-family:Inter,sans-serif;width:160px;background:transparent;"
          oninput="filterLots(this.value)"
          onfocus="document.getElementById('lot-dropdown-list').style.display='block'"
          onblur="setTimeout(()=>{const d=document.getElementById('lot-dropdown-list');if(d)d.style.display='none'},180)">
        <span style="padding:8px 12px;color:#9ca3af;font-size:12px;">▼</span>
      </div>
      <div id="lot-dropdown-list" style="display:none;position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:100;min-width:100%;overflow:hidden;">
        ${S.lots.map((l,i)=>`<div onclick="switchLot(${i})" style="padding:10px 16px;cursor:pointer;font-size:13px;font-weight:${i===S.al?'700':'500'};color:${i===S.al?'#1d4ed8':'#374151'};background:${i===S.al?'#eff6ff':'#fff'};border-bottom:1px solid #f3f4f6;" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='${i===S.al?'#eff6ff':'#fff'}'">
          <div>${l.id}</div>
          <div style="font-size:11px;color:#9ca3af;font-weight:400;margin-top:2px">${l.name||''}</div>
        </div>`).join('')}
      </div>
    </div>`;

    const dashHeader=`<div class="dash-header">
      <div class="rate-mini"><label>EUR / ILS</label><input type="number" step="0.0001" value="${S.rEur}" oninput="S.rEur=parseFloat(this.value)||0;save();render()"></div>
      <div class="rate-mini"><label>USD / ILS</label><input type="number" step="0.0001" value="${S.rUsd}" oninput="S.rUsd=parseFloat(this.value)||0;save();render()"></div>
      <button id="refresh-rates-btn" onclick="refreshRates()" style="display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid #e5e7eb;border-radius:9px;padding:8px 14px;font-size:11px;font-weight:700;color:#6b7280;cursor:pointer;font-family:Inter,sans-serif;transition:all .15s;white-space:nowrap;" onmouseover="this.style.borderColor='#3b82f6';this.style.color='#2563eb'" onmouseout="this.style.borderColor='#e5e7eb';this.style.color='#6b7280'">
        <svg id="refresh-icon" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Actualiser les taux
      </button>
      <div class="dh-sep"></div>
      ${lotDropdown}
    </div>`;

    // ── Lot active card ──────────────────────────────────────────────────────
    const statusOpts=LOT_STATUSES.map(s=>`<option value="${s}"${c.lot.status===s?' selected':''}>${s||'— Statut —'}</option>`).join('');
    const estimatedProfit=c.er>0&&c.bp>0?c.er-c.bestTerr.shipping-c.bp:null;
    const profitColor=estimatedProfit==null?'#9ca3af':estimatedProfit>0?'#15803d':'#dc2626';
    const lacHtml=`<div class="lot-active-card">
      <div class="lac-left">
        <div class="lac-id">${c.lot.id}</div>
        <div class="lac-name">${c.lot.name}</div>
        <div class="lac-status">
          <select onchange="S.lots[${S.al}].status=this.value;save()">${statusOpts}</select>
        </div>
      </div>
      <div class="lac-stats">
        <div class="lac-stat">Unités<b>${c.totalQty}</b></div>
        <div class="lac-stat">Références<b>${c.lot.items.length}</b></div>
        <div class="lac-stat">Prix achat<b>${c.bp>0?N(c.bp)+' ILS':'—'}</b></div>
        <div class="lac-stat">Profit estimé<b style="color:${profitColor}">${estimatedProfit!=null?N(estimatedProfit)+' ILS':'—'}</b></div>
        <div class="lac-stat">Propositions<b>${c.lot.proposals.length}</b></div>
      </div>
      <button onclick="setTab('lot')" style="background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:9px;padding:8px 16px;font-size:12px;font-weight:700;color:#1d4ed8;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;">${IC.box} Voir le détail du lot</button>
    </div>`;

    // ── Valeur de marché — 2 lignes ──────────────────────────────────────────
    // Ligne 1: VMR par pays (toutes les territories)
    const vmrCells1=S.territories.map(t=>{
      const v=c.terrVmrs[t.id];
      const isBest=t.id===c.bestTerr.id;
      return`<div class="vmr-cell${isBest?' best':''}">
        <div class="vmr-cell-lbl">${t.flag} ${t.name} (${t.currency})${isBest?`<span class="vmr-best-badge">BEST EXIT</span>`:''}</div>
        <div class="vmr-cell-val${isBest?' sky':''}">${N(v?.totalLocal)} ${t.currency==='EUR'?'€':'$'}</div>
        <div class="vmr-cell-sub">≈ ${N(v?.totalIls)} ILS</div>
      </div>`;
    }).join('');
    // Ligne 2: Best Total VMR (retail) + Estimated Resale
    const vmrCells2=`
      <div class="vmr-cell">
        <div class="vmr-cell-lbl">Batch Total VMR — Retail</div>
        <div class="vmr-cell-val">${N(c.batchVmr)} ILS</div>
        <div class="vmr-cell-sub">Valeur au détail totale · ≈ ${N(c.batchVmr/S.rEur)} €</div>
      </div>
      <div class="vmr-cell">
        <div class="vmr-cell-lbl">Estimated Resale × ${S.exitC}</div>
        <div class="vmr-cell-val">${N(c.er)} ILS</div>
        <div class="vmr-cell-sub">≈ ${N(c.er/S.rEur)} € · Best exit: ${c.bestTerr.flag} ${c.bestTerr.name}</div>
      </div>`;

    const vmrHtml=`
    <div class="sh"><div class="sh-bar" style="background:#3b82f6"></div><span class="sh-title">Valeur de Marché</span></div>
    <div class="vmr-section">
      <div class="vmr-row">
        <div class="vmr-row-label">VMR par Pays</div>
        <div class="vmr-cells">${vmrCells1}</div>
      </div>
      <div class="vmr-row">
        <div class="vmr-row-label">Best VMR & Resale</div>
        <div class="vmr-cells">${vmrCells2}</div>
      </div>
    </div>`;

    // ── Seuils d'achat — 3 cadrans ──────────────────────────────────────────
    const deltaMaxIdeal=c.maxB-c.idealB;
    const deltaExtremeMax=c.extremeB-c.maxB;
    const threshHtml=`
    <div class="sh"><div class="sh-bar" style="background:#7c3aed"></div><span class="sh-title">Seuils d'Achat</span></div>
    <div class="thresh-grid">
      <div class="tc g">
        <span class="tc-tag g">✅ IDEAL BUY PRICE — TARGET</span>
        <div class="tc-name g">Commencez avec cette offre</div>
        <div class="tc-val g">${N(c.idealB)} ILS</div>
        <div class="tc-eur g">≈ ${N(c.idealB/S.rEur)} €</div>
        <div class="tc-reco g">Start with this offer. At this price your margin exceeds your ${P(S.tMarg,0)} target.</div>
      </div>
      <div class="tc a">
        <span class="tc-tag a">⚠️ MAX BUY PRICE — CEILING</span>
        <div class="tc-name a">Plafond de négociation</div>
        <div class="tc-val a">${N(c.maxB)} ILS</div>
        <div class="tc-eur a">≈ ${N(c.maxB/S.rEur)} €</div>
        <div style="display:inline-flex;align-items:center;gap:5px;background:#fef3c7;border:1px solid #fde68a;border-radius:6px;padding:3px 9px;margin-bottom:6px;">
          <span style="font-size:10px;font-weight:700;color:#92400e;">+${N(deltaMaxIdeal)} ILS vs Ideal</span>
          <span style="font-size:10px;color:#b45309;">(+${N(deltaMaxIdeal/S.rEur)} €)</span>
        </div>
        <div class="tc-reco a">At this price you exactly reach your ${P(S.tMarg,0)} margin target. Do not go above without a clear reason.</div>
      </div>
      <div class="tc o">
        <span class="tc-tag o">🔥 EXTREME RISK — I WANT THE DEAL</span>
        <div class="tc-name o">Zone de risque élevé</div>
        <div class="tc-val o">${N(c.extremeB)} ILS</div>
        <div class="tc-eur o">≈ ${N(c.extremeB/S.rEur)} €</div>
        <div style="display:inline-flex;align-items:center;gap:5px;background:#ffedd5;border:1px solid #fed7aa;border-radius:6px;padding:3px 9px;margin-bottom:6px;">
          <span style="font-size:10px;font-weight:700;color:#9a3412;">+${N(deltaExtremeMax)} ILS vs Max</span>
          <span style="font-size:10px;color:#c2410c;">(+${N(deltaExtremeMax/S.rEur)} €)</span>
        </div>
        <div class="tc-reco o">Above this price your capital is at risk. Margin drops below 10%. Only if you really want the deal.</div>
      </div>
    </div>`;

    // ── Négociation — Prix de vente ──────────────────────────────────────────
    const proposalRows=c.proposals.map((p,i)=>{
      const ilsDisplay=p.amtIls>0?`≈ ${N(p.amtIls)} ILS`:'';
      return`<div class="proposal-row">
        <select class="p-buyer-sel" onchange="S.lots[${S.al}].proposals[${i}].buyerId=this.value;save();render()">
          ${S.buyers.map(b=>`<option value="${b.id}"${p.buyerId===b.id?' selected':''}>${b.name}</option>`).join('')}
        </select>
        <span class="p-terr">${p.terr?.flag||''} ${p.terr?.name||''}</span>
        <input class="p-in" type="number" placeholder="Prix" value="${p.amount||''}"
          oninput="S.lots[${S.al}].proposals[${i}].amount=parseFloat(this.value)||0;save();render()">
        <select class="p-currency" onchange="S.lots[${S.al}].proposals[${i}].currency=this.value;save();render()">
          <option value="EUR"${p.currency==='EUR'?' selected':''}>EUR</option>
          <option value="USD"${p.currency==='USD'?' selected':''}>USD</option>
          <option value="ILS"${p.currency==='ILS'?' selected':''}>ILS</option>
        </select>
        <span class="p-ils">${ilsDisplay}</span>
        <button class="p-del" onclick="S.lots[${S.al}].proposals.splice(${i},1);save();render()">${IC.trash}</button>
      </div>`;
    }).join('');

    // ── Prix d'achat + réglette ──────────────────────────────────────────────
    const buyMarginGrossDisplay=c.bp>0?P(c.buyMarginGross):'—';
    const badgeClass=c.buyStatus==='n'?'n':c.buyStatus;
    const badgeIcon=c.buyStatus==='g'?IC.check16:c.buyStatus==='a'||c.buyStatus==='o'?IC.warn16:c.buyStatus==='r'?IC.x16:'';
    const buyBarHtml=c.er>0?buyPriceBarHtml(c.bp,c.er,c.idealB,c.maxB,c.extremeB):'';

    const negoHtml=`
    <div class="sh"><div class="sh-bar" style="background:#f97316"></div><span class="sh-title">Négociation en Cours</span></div>
    <div class="nego-wrap">
      <div class="nego-subtitle">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        💰 Prix de Vente — Propositions aux Acheteurs
      </div>
      <div class="proposals-list">${proposalRows||'<div style="color:#9ca3af;font-size:13px;padding:8px 0">Aucune proposition — ajoutez-en une ci-dessous</div>'}</div>
      <button class="add-proposal-btn" onclick="addProposal()">${IC.plus} Ajouter une proposition</button>

      <div class="buy-section">
        <div class="nego-subtitle" style="margin-bottom:14px">
          🏷️ Prix d'Achat — Mon Enchère au Vendeur
        </div>
        <div class="buy-row">
          <div>
            <div class="buy-label">Mon enchère (ILS)</div>
            <input class="buy-in" type="number" placeholder="0" value="${c.bp||''}"
              oninput="S.lots[${S.al}].buyPrice=parseFloat(this.value)||0;save();render()">
          </div>
          <div class="buy-meta">
            <div class="buy-eur">≈ ${N(c.bp/S.rEur)} €</div>
            <span class="mbadge ${badgeClass}">${badgeIcon} Marge Brut ${buyMarginGrossDisplay}</span>
          </div>
        </div>
        ${buyBarHtml}
      </div>
    </div>`;

    // ── Tableau profit par acheteur ──────────────────────────────────────────
    const activeCols=c.proposals.filter(p=>p.amtIls>0);
    let profitHtml='';
    if(activeCols.length>0){
      const colCount=activeCols.length;
      const colsStyle=`--cols:${colCount}`;
      const rows=[
        {label:'Prix de vente',vals:activeCols.map(p=>`<span class="ptr-val">${N(p.amtIls)} ILS</span>`)},
        {label:`− Shipping (${c.bestTerr.name})`,vals:activeCols.map(p=>`<span class="ptr-val neg">−${N(p.terr?.shipping||0)}</span>`)},
        {label:'− Taxes & Import',vals:activeCols.map(p=>`<span class="ptr-val neg">−${N(p.amtIls*(((p.terr?.taxes||0)+(p.terr?.importDuty||0))/100))}</span>`)},
        {label:'− Prix d\'achat',vals:activeCols.map(p=>`<span class="ptr-val neg">−${N(c.bp)}</span>`)},
      ];
      profitHtml=`
      <div class="sh" style="margin-top:6px"><div class="sh-bar" style="background:#22c55e"></div><span class="sh-title">Calcul du Profit Net par Acheteur</span></div>
      <div class="profit-section">
        <div class="profit-table">
          <div class="profit-table-head" style="${colsStyle}">
            <span></span>
            ${activeCols.map(p=>`<span>${p.buyer?.name||'?'} ${p.terr?.flag||''}<br><small style="font-weight:500;text-transform:none;letter-spacing:0">${N(p.amount)} ${p.currency}</small></span>`).join('')}
          </div>
          ${rows.map(r=>`<div class="profit-table-row" style="${colsStyle}">
            <span class="ptr-label">${r.label}</span>${r.vals.map(v=>`<div>${v}</div>`).join('')}
          </div>`).join('')}
          <div class="profit-table-row total-row" style="${colsStyle}">
            <span class="ptr-label bold">= Profit Net</span>
            ${activeCols.map(p=>`<div>
              <div class="ptr-net ${p.status}">${N(p.profit)} ILS</div>
              <div class="ptr-sub">≈ ${N(p.profit/S.rEur)} € · Marge ${P(p.margin)}</div>
            </div>`).join('')}
          </div>
        </div>
      </div>`;
    }

    // ── Banner recommandation — en fin de page ───────────────────────────────
    const banData={
      g:{icon:IC.check28,title:'✅ EXCELLENT DEAL — BUY NOW',sub:'Votre prix d\'achat est en dessous du prix idéal. La marge est supérieure à votre objectif. Achetez.'},
      a:{icon:IC.warn28,title:'⚠️ ACCEPTABLE — NÉGOCIEZ ENCORE',sub:'Le prix est dans les limites mais en dessous de votre objectif. Tentez de négocier avant de valider.'},
      o:{icon:IC.fire28,title:'🔥 ABOVE MAX — YOU WANT THE DEAL',sub:'Au-dessus du plafond. Votre marge sera inférieure à votre objectif. Décision à risque.'},
      r:{icon:IC.x28,title:'🛑 STOP — CAPITAL AT RISK',sub:'Le prix dépasse la zone de risque extrême. La marge nette sera proche de zéro ou négative.'},
      n:{icon:'⏳',title:'EN ATTENTE',sub:'Saisissez votre prix d\'achat pour voir la recommandation.'}
    };
    const bd=banData[c.buyStatus]||banData.n;
    const bannerHtml=`
    <div class="sh" style="margin-top:6px"><div class="sh-bar" style="background:#6366f1"></div><span class="sh-title">Recommandation</span></div>
    <div class="banner ${c.buyStatus}">
      <div style="flex-shrink:0;color:${c.buyStatus==='g'?'#16a34a':c.buyStatus==='a'?'#d97706':c.buyStatus==='o'?'#c2410c':c.buyStatus==='r'?'#dc2626':'#6b7280'}">${bd.icon}</div>
      <div>
        <div class="ban-title ${c.buyStatus}">${bd.title}</div>
        <div class="ban-sub ${c.buyStatus}">${bd.sub}</div>
      </div>
    </div>`;

    el.innerHTML=dashHeader+lacHtml+vmrHtml+threshHtml+negoHtml+profitHtml+bannerHtml;
    if(S.adding)setTimeout(()=>document.getElementById('nid')?.focus(),30);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // DETAIL DU LOT
  // ═══════════════════════════════════════════════════════════════════════════
  else if(S.tab==='lot'){
    const terrCols=S.territories.map(t=>`<th>VMR ${t.flag} (${t.currency}/u)</th>`).join('');
    // Category color map
    const catColors={'Smartphones':'#3b82f6','Tablettes':'#8b5cf6','Accessoires':'#f59e0b'};
    const catBg={'Smartphones':'#eff6ff','Tablettes':'#f5f3ff','Accessoires':'#fffbeb'};
    function catColor(cat){return catColors[cat]||'#6b7280';}
    function catBgFn(cat){return catBg[cat]||'#f9fafb';}
    // Category filter bar
    const allCatsInLot=[...new Set(c.lot.items.map(it=>getRef(it.m).cat||'Autre'))];
    if(!S.lotCatFilter||!allCatsInLot.includes(S.lotCatFilter))S.lotCatFilter=S.lotCatFilter||'';
    const catFilterBar=allCatsInLot.length>1?`<div style="display:flex;gap:8px;align-items:center;padding:14px 18px 6px;flex-wrap:wrap;">
      <span style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em;margin-right:4px;">Filtrer</span>
      <button onclick="S.lotCatFilter='';render()" style="padding:5px 13px;font-size:11px;font-weight:700;border-radius:9999px;border:2px solid ${''===S.lotCatFilter?'#1d4ed8':'#e5e7eb'};background:${''===S.lotCatFilter?'#dbeafe':'#fff'};color:${''===S.lotCatFilter?'#1d4ed8':'#6b7280'};cursor:pointer;font-family:Inter,sans-serif;">Tout (${c.lot.items.length})</button>
      ${allCatsInLot.map(cat=>`<button onclick="S.lotCatFilter='${cat}';render()" style="padding:5px 13px;font-size:11px;font-weight:700;border-radius:9999px;border:2px solid ${cat===S.lotCatFilter?catColor(cat):'#e5e7eb'};background:${cat===S.lotCatFilter?catBgFn(cat):'#fff'};color:${cat===S.lotCatFilter?catColor(cat):'#6b7280'};cursor:pointer;font-family:Inter,sans-serif;">${cat} (${c.lot.items.filter(it=>(getRef(it.m).cat||'Autre')===cat).length})</button>`).join('')}
    </div>`:'';
    const visibleItems=S.lotCatFilter?c.lot.items.filter(it=>(getRef(it.m).cat||'Autre')===S.lotCatFilter):c.lot.items;
    const rows=visibleItems.length?visibleItems.map(it=>{
      const i=c.lot.items.indexOf(it);
      const ref=getRef(it.m);
      const cat=ref.cat||'—';
      const terrVals=S.territories.map(t=>`<td style="color:#6b7280;font-family:monospace;font-size:12px">${ref.prices[t.id]||'—'} ${t.currency==='EUR'?'€':'$'}</td>`).join('');
      const bestUnitIls=Math.max(0,...S.territories.map(t=>(ref.prices[t.id]||0)*terrRate(t)));
      return`<tr>
        <td style="color:#111827;font-weight:500;font-size:13px">
          ${it.m}<span style="display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:9999px;background:${catBgFn(cat)};color:${catColor(cat)};border:1px solid ${catColor(cat)}33;white-space:nowrap;margin-left:7px;vertical-align:middle">${cat}</span>
        </td>
        <td><input class="tin" type="number" value="${it.qty}" style="width:64px" oninput="S.lots[${S.al}].items[${i}].qty=parseInt(this.value)||0;save();render()"></td>
        ${terrVals}
        <td style="color:#1d4ed8;font-weight:700;font-family:monospace;font-size:13px">${N(it.qty*bestUnitIls)} ILS</td>
        <td><button class="tdel" onclick="S.lots[${S.al}].items.splice(${i},1);save();render()">${IC.trash}</button></td>
      </tr>`;
    }).join(''):`<tr><td colspan="${3+S.territories.length}" style="text-align:center;padding:32px;color:#9ca3af">${S.lotCatFilter?`Aucun produit dans "${S.lotCatFilter}"`:'Aucun produit — ajoutez-en ci-dessous'}</td></tr>`;

    const opts=S.ref.map(r=>`<option value="${r.m}">${r.m}</option>`).join('');
    const lacStats=S.territories.map(t=>`<div class="lac-stat">VMR ${t.flag}<b>${N(c.terrVmrs[t.id]?.totalLocal)} ${t.currency==='EUR'?'€':'$'}</b></div>`).join('');

    el.innerHTML=`
    <div class="lot-active-card">
      <div class="lac-left">
        <div class="lac-id">${c.lot.id}</div>
        <div class="lac-name">${c.lot.name}</div>
        ${c.lot.status?`<div style="font-size:12px;color:#2563eb;font-weight:600;margin-top:4px">${c.lot.status}</div>`:''}
      </div>
      <div class="lac-stats">
        <div class="lac-stat">Unités<b>${c.totalQty}</b></div>
        ${lacStats}
        <div class="lac-stat">Best VMR<b>${N(c.batchVmr)} ILS</b></div>
      </div>
    </div>
    <div class="aform">
      <div class="arow">
        <div class="afield af-grow"><label>Sélectionner un modèle</label>
          <select class="asel" id="am"><option value="">— Sélectionner un modèle —</option>${opts}</select>
        </div>
        <div class="afield" style="width:100px"><label>Quantité</label>
          <input class="ain" id="aq" type="number" placeholder="Qté" style="width:100%">
        </div>
        <button class="btn-blue" onclick="addItem()" style="align-self:flex-end">${IC.plus} Ajouter</button>
      </div>
    </div>
    ${catFilterBar}
    <div class="twrap"><table class="dt">
      <thead><tr><th>Modèle</th><th>Qté</th>${terrCols}<th>Total Best Exit (ILS)</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // PARAMÈTRES
  // ═══════════════════════════════════════════════════════════════════════════
  else if(S.tab==='params'){
    // Rates reminder
    const ratesHtml=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:22px;padding:14px 20px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;flex-wrap:wrap;">
      <span style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em">Taux actifs</span>
      <div style="background:#fff7ed;border:1.5px solid #fed7aa;border-radius:8px;padding:7px 14px;display:flex;gap:8px;align-items:center">
        <span style="font-size:10px;font-weight:700;color:#9ca3af">EUR/ILS</span>
        <span style="font-size:16px;font-weight:700;color:#c2410c;font-family:monospace">${S.rEur}</span>
      </div>
      <div style="background:#fff7ed;border:1.5px solid #fed7aa;border-radius:8px;padding:7px 14px;display:flex;gap:8px;align-items:center">
        <span style="font-size:10px;font-weight:700;color:#9ca3af">USD/ILS</span>
        <span style="font-size:16px;font-weight:700;color:#c2410c;font-family:monospace">${S.rUsd}</span>
      </div>
      <span style="font-size:11px;color:#9ca3af">Modifiables dans le Dashboard</span>
    </div>`;

    // Strategy
    const stratHtml=`
    <div class="sh"><div class="sh-bar" style="background:#6366f1"></div><span class="sh-title">Stratégie &amp; Marges</span></div>
    <div class="pgrid">
      <div class="pcard"><label>Exit Coeff (décote grossiste)</label><input class="pin" type="number" step="0.01" value="${S.exitC}" oninput="S.exitC=parseFloat(this.value)||0;save();render()"></div>
      <div class="pcard"><label>Ideal Buy Coeff (ancre)</label><input class="pin" type="number" step="0.01" value="${S.idealC}" oninput="S.idealC=parseFloat(this.value)||0;save();render()"></div>
      <div class="pcard"><label>Target Net Margin (%)</label><input class="pin" type="number" step="0.01" value="${S.tMarg}" oninput="S.tMarg=parseFloat(this.value)||0;save();render()"></div>
    </div>`;

    // Territories
    const terrCards=S.territories.map((t,i)=>`
      <div class="terr-card">
        ${i>1?`<button class="terr-del" onclick="S.territories.splice(${i},1);save();render()">${IC.trash}</button>`:''}
        <div class="terr-fields">
          <div class="terr-field"><label>Emoji / Flag</label><input class="terr-input" value="${t.flag}" style="font-size:20px;width:60px" onchange="S.territories[${i}].flag=this.value;save()"></div>
          <div class="terr-field"><label>Nom</label><input class="terr-input" value="${t.name}" style="font-weight:700" onchange="S.territories[${i}].name=this.value;save()"></div>
          <div class="terr-field"><label>Devise</label>
            <select class="terr-input" onchange="S.territories[${i}].currency=this.value;save();render()">
              <option value="EUR"${t.currency==='EUR'?' selected':''}>EUR</option>
              <option value="USD"${t.currency==='USD'?' selected':''}>USD</option>
              <option value="GBP"${t.currency==='GBP'?' selected':''}>GBP</option>
            </select>
          </div>
          <div class="terr-field"><label>Shipping (ILS)</label><input class="terr-input" type="number" value="${t.shipping}" oninput="S.territories[${i}].shipping=parseFloat(this.value)||0;save()"></div>
          <div class="terr-field"><label>Taxes (%)</label><input class="terr-input" type="number" step="0.5" value="${t.taxes}" oninput="S.territories[${i}].taxes=parseFloat(this.value)||0;save()"></div>
          <div class="terr-field"><label>Droits Import (%)</label><input class="terr-input" type="number" step="0.5" value="${t.importDuty}" oninput="S.territories[${i}].importDuty=parseFloat(this.value)||0;save()"></div>
        </div>
      </div>`).join('');

    const terrHtml=`
    <div class="sh"><div class="sh-bar" style="background:#3b82f6"></div><span class="sh-title">Territoires &amp; Marchés</span></div>
    <div class="terr-grid">
      ${terrCards}
      <div class="add-terr-card" onclick="addTerritory()">
        <span style="font-size:13px;font-weight:600;color:#9ca3af">+ Ajouter un territoire</span>
      </div>
    </div>`;

    // Buyers
    const buyerRows=S.buyers.map((b,i)=>`
      <div class="buyer-card">
        <div>
          <input style="font-size:13px;font-weight:600;color:#111827;border:none;background:transparent;outline:none;width:130px;font-family:Inter,sans-serif" value="${b.name}" onchange="S.buyers[${i}].name=this.value;save()">
          <div>
            <select style="font-size:11px;color:#6b7280;border:none;background:transparent;cursor:pointer;font-family:Inter,sans-serif" onchange="S.buyers[${i}].territory=this.value;save()">
              ${S.territories.map(t=>`<option value="${t.id}"${b.territory===t.id?' selected':''}>${t.flag} ${t.name}</option>`).join('')}
            </select>
          </div>
        </div>
        <button class="tdel" onclick="S.buyers.splice(${i},1);save();render()">${IC.trash}</button>
      </div>`).join('');

    const buyersHtml=`
    <div class="sh"><div class="sh-bar" style="background:#ec4899"></div><span class="sh-title">Acheteurs</span></div>
    <div class="aform" style="margin-bottom:12px"><div class="arow">
      <div class="afield" style="flex:1;min-width:160px"><label>Nom de l'acheteur</label>
        <input class="ain" id="bn" placeholder="Ex: PhonePoint" style="width:100%">
      </div>
      <div class="afield" style="width:180px"><label>Territoire</label>
        <select class="asel" id="bt">${S.territories.map(t=>`<option value="${t.id}">${t.flag} ${t.name}</option>`).join('')}</select>
      </div>
      <button class="btn-blue" onclick="addBuyer()" style="align-self:flex-end">${IC.plus} Ajouter</button>
    </div></div>
    <div class="buyers-grid">${buyerRows}</div>`;

    // Referentiel by category — onglets
    const cats=[...new Set(S.ref.map(r=>r.cat))];
    if(!S.refCat||!cats.includes(S.refCat))S.refCat=cats[0]||'';
    const activeCat=S.refCat;

    const catTabs=cats.map(cat=>`
      <button onclick="S.refCat='${cat}';render()" style="padding:9px 18px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;border:none;border-bottom:3px solid ${cat===activeCat?'#0ea5e9':'transparent'};background:none;color:${cat===activeCat?'#0369a1':'#9ca3af'};cursor:pointer;white-space:nowrap;transition:all .15s;font-family:Inter,sans-serif;">
        ${cat}
        <span style="background:${cat===activeCat?'#e0f2fe':'#f3f4f6'};color:${cat===activeCat?'#0369a1':'#9ca3af'};border-radius:9999px;padding:1px 7px;font-size:10px;margin-left:5px;">${S.ref.filter(r=>r.cat===cat).length}</span>
      </button>`).join('');

    // Onglet "Nouvelle catégorie"
    const newCatTab=`<button onclick="S.refCat='__new__';render()" style="padding:9px 18px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;border:none;border-bottom:3px solid ${'__new__'===activeCat?'#0ea5e9':'transparent'};background:none;color:${'__new__'===activeCat?'#0369a1':'#9ca3af'};cursor:pointer;white-space:nowrap;transition:all .15s;font-family:Inter,sans-serif;">
      ${IC.plus} Nouvelle catégorie
    </button>`;

    let catPanelHtml='';
    if(activeCat==='__new__'){
      catPanelHtml=`<div class="aform" style="margin-top:16px"><div class="arow">
        <div class="afield" style="flex:1;min-width:200px"><label>Nom de la catégorie</label>
          <input class="ain" id="nc" placeholder="Ex: Wearables" style="width:100%">
        </div>
        <button class="btn-blue" onclick="addCat()" style="align-self:flex-end">${IC.plus} Créer la catégorie</button>
      </div></div>`;
    } else {
      const items=S.ref.filter(r=>r.cat===activeCat);
      const terrHeaders=S.territories.map(t=>`<th>VMR ${t.flag} (${t.currency})</th>`).join('');
      const refRows=items.map(r=>{
        const ri=S.ref.indexOf(r);
        const terrInputs=S.territories.map(t=>`<td><input class="tin" type="number" value="${r.prices[t.id]||''}" style="width:90px" oninput="S.ref[${ri}].prices['${t.id}']=parseFloat(this.value)||0;save()"></td>`).join('');
        return`<tr>
          <td><input class="tin" value="${r.m}" style="width:230px;font-weight:500;font-family:Inter,sans-serif" onchange="S.ref[${ri}].m=this.value;save()"></td>
          ${terrInputs}
          <td><button class="tdel" onclick="S.ref.splice(${ri},1);save();render()">${IC.trash}</button></td>
        </tr>`;
      }).join('');
      catPanelHtml=`
        <div class="aform" style="padding:12px 16px;margin:12px 0 8px;box-shadow:0 2px 8px rgba(0,0,0,.06)">
          <div class="arow">
            <div class="afield" style="flex:1;min-width:180px"><label>Modèle</label>
              <input class="ain" id="rm_${activeCat}" placeholder="Ex: iPhone 18 128GB" style="width:100%">
            </div>
            ${S.territories.map(t=>`<div class="afield" style="width:100px"><label>VMR ${t.flag}</label><input class="ain" id="rp_${activeCat}_${t.id}" type="number" placeholder="0" style="width:100%"></div>`).join('')}
            <button class="btn-blue" onclick="addRefItem('${activeCat}')" style="align-self:flex-end">${IC.plus} Ajouter</button>
          </div>
        </div>
        <div class="twrap"><table class="dt">
          <thead><tr><th>Modèle</th>${terrHeaders}<th></th></tr></thead>
          <tbody>${refRows||`<tr><td colspan="${2+S.territories.length}" style="text-align:center;padding:24px;color:#9ca3af">Aucun modèle — ajoutez-en un ci-dessus</td></tr>`}</tbody>
        </table></div>`;
    }

    const refHtml=`
    <div class="sh"><div class="sh-bar" style="background:#0ea5e9"></div><span class="sh-title">Référentiel de Prix</span>
      <span class="sh-spacer"></span>
      <button class="btn-sec" onclick="if(confirm('Réinitialiser le référentiel ?')){S.ref=DEFAULT_REF.map(r=>({...r,prices:{...r.prices}}));S.refCat='Smartphones';save();render()}">↺ Reset</button>
    </div>
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;margin-bottom:20px;">
      <div style="display:flex;border-bottom:1px solid #e5e7eb;overflow-x:auto;padding:0 6px;background:#f9fafb;">
        ${catTabs}${newCatTab}
      </div>
      <div style="padding:0 4px 16px;">
        ${catPanelHtml}
      </div>
    </div>`;

    el.innerHTML=ratesHtml+stratHtml+terrHtml+buyersHtml+refHtml;
  }
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function addProposal(){
  S.lots[S.al].proposals.push({id:uid(),buyerId:S.buyers[0]?.id||'',amount:0,currency:'EUR'});
  save();render();
}
function addItem(){
  const m=document.getElementById('am')?.value,q=parseInt(document.getElementById('aq')?.value)||0;
  if(!m||!q)return;
  S.lots[S.al].items.push({m,qty:q});save();render();
}
function addTerritory(){
  const id='t'+uid();
  S.territories.push({id,name:'Nouveau marché',flag:'🌍',currency:'EUR',shipping:5000,taxes:0,importDuty:0});
  S.ref.forEach(r=>{if(r.prices&&!r.prices[id])r.prices[id]=0;});
  save();render();
}
function addBuyer(){
  const name=document.getElementById('bn')?.value?.trim(),territory=document.getElementById('bt')?.value;
  if(!name)return;
  S.buyers.push({id:uid(),name,territory:territory||'fr'});save();render();
}
function addRefItem(cat){
  const safeCat=cat||S.refCat;
  const m=document.getElementById(`rm_${safeCat}`)?.value?.trim();
  if(!m)return;
  const prices={};
  S.territories.forEach(t=>{prices[t.id]=parseFloat(document.getElementById(`rp_${safeCat}_${t.id}`)?.value)||0;});
  S.ref.push({cat:safeCat,m,prices});save();render();
}
function addCat(){
  const name=document.getElementById('nc')?.value?.trim();
  if(!name)return;
  S.ref.push({cat:name,m:'— Nouveau modèle —',prices:Object.fromEntries(S.territories.map(t=>[t.id,0]))});
  S.refCat=name;
  save();render();
}

// ── REFRESH RATES via Frankfurter (BCE) ──────────────────────────────────────
async function refreshRates(){
  const btn=document.getElementById('refresh-rates-btn');
  const icon=document.getElementById('refresh-icon');
  if(btn){btn.disabled=true;btn.style.opacity='.6';}
  if(icon)icon.style.animation='spin .8s linear infinite';
  try{
    // EUR→ILS et USD→ILS en deux appels parallèles
    const [resEur,resUsd]=await Promise.all([
      fetch('https://api.frankfurter.app/latest?from=EUR&to=ILS'),
      fetch('https://api.frankfurter.app/latest?from=USD&to=ILS')
    ]);
    const [dataEur,dataUsd]=await Promise.all([resEur.json(),resUsd.json()]);
    const newEur=dataEur?.rates?.ILS;
    const newUsd=dataUsd?.rates?.ILS;
    if(newEur&&newUsd){
      S.rEur=Math.round(newEur*100000)/100000;
      S.rUsd=Math.round(newUsd*100000)/100000;
      save();
      render();
      // Toast spécifique
      const t=document.getElementById('toast');
      if(t){t.textContent=`✓ Taux mis à jour — EUR/ILS: ${S.rEur} · USD/ILS: ${S.rUsd}`;t.classList.add('show');setTimeout(()=>{t.classList.remove('show');t.textContent='✓ Sauvegardé';},3000);}
    } else {
      alert('Impossible de récupérer les taux. Vérifiez votre connexion.');
    }
  }catch(e){
    alert('Erreur réseau. Les taux n\'ont pas été mis à jour.');
  }finally{
    if(btn){btn.disabled=false;btn.style.opacity='1';}
    if(icon)icon.style.animation='';
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderTop();render();
</script>
